id: lexisnexis-aplus
name: LexisNexis A-PLUS
domain: personalreports.lexisnexis.com
aliases: [consumer.risk.lexisnexis.com]
category: insurance
data_types:
  - name
  - address
  - dob
  - insurance-claims
  - property-records
  - auto-claims
  - personal-property-claims

scan:
  scannable: false
  reason: "Insurance claims history database. No public search. Consumers can request their own A-PLUS (Automated Property Loss Underwriting System) report."

optout:
  methods:
    - type: web_form
      url: "https://personalreports.lexisnexis.com/fact_act_disclosure.jsp"
      required_fields: [full_name, dob, address, ssn]
      template_id: null
      notes: "Request your A-PLUS personal property insurance report. Also known as FACT Act disclosure."
    - type: email
      email_to: privacy.information.mgr@lexisnexis.com
      required_fields: [full_name, email, address, dob]
      template_id: ccpa_maximum
    - type: phone
      phone_number: "1-866-312-8076"
      required_fields: [full_name, dob]
      notes: "A-PLUS consumer support line."
  difficulty: hard
  estimated_minutes: 15
  processing_days: 30
  legal_max_days: 45
  notes: "A-PLUS (Automated Property Loss Underwriting System) tracks personal property insurance claims including auto, homeowners, and renters insurance. Used by insurance companies for underwriting decisions. FCRA-regulated. Separate from CLUE reports. Consumers entitled to one free report annually."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
    vermont: true
  state_laws: [california, virginia, colorado, connecticut, texas, oregon]

timing:
  typical_removal_days: 30
  relisting_likelihood: low
  recheck_interval_days: 180

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.85
  notes: "Source: CFPB consumer reporting companies list, LexisNexis personal reports site. A-PLUS is separate from CLUE but both are LexisNexis insurance data products. Tracks 5 years of personal property claims."
