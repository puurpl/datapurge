id: experian-rentbureau
name: Experian RentBureau
domain: experian.com/rental-property-solutions/rentbureau
aliases: [experian.com/rentbureau]
category: tenant-screening
data_types:
  - name
  - address
  - phone
  - dob
  - rental-payment-history
  - eviction-records

scan:
  scannable: false
  reason: "Rental payment history database. No public consumer search. Consumers can request their own RentBureau Consumer Profile report."

optout:
  methods:
    - type: email
      email_to: optout@experian.com
      required_fields: [full_name, address, email]
      template_id: ccpa_maximum
      notes: "Email optout@experian.com with full name, mailing address, and specify opt-out from sale of personal information. Opt-out lasts 5 years."
    - type: phone
      phone_number: "1-877-704-4519"
      required_fields: [full_name, dob, address]
      notes: "Call for rental history report requests or disputes."
  difficulty: medium
  estimated_minutes: 10
  processing_days: 15
  legal_max_days: 45
  notes: "Largest rental payment database in the US. Collects rent payment history from property owners, property management companies, and electronic rent payment services. Consumers can request a free RentBureau Consumer Profile report annually. Disputes can be filed for inaccurate rental data. Opt-out via optout@experian.com lasts 5 years."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
  state_laws: [california, virginia, colorado, connecticut]

timing:
  typical_removal_days: 15
  relisting_likelihood: medium
  recheck_interval_days: 90

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.85
  notes: "Source: CFPB consumer reporting companies list, Experian privacy policy, Experian opting out page. Part of Experian but operates as a separate specialty CRA for rental data."
