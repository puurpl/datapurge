id: unicourt
name: UniCourt
domain: unicourt.com
aliases: []
category: public-records
data_types:
  - name
  - address
  - court-records
  - criminal-records
  - property-records

scan:
  scannable: true
  method: web_search
  search_url: "https://unicourt.com/party-search?q={first_name}+{last_name}"
  detection:
    - method: selector_present
      value: ".search-result"
      means: listed
    - method: text_match
      value: "No results found"
      means: not_listed
  anti_bot:
    captcha: false
    cloudflare: true
    rate_limit_per_minute: 3

optout:
  methods:
    - type: web_form
      url: "https://unicourt.com/public-records-policy"
      required_fields: [full_name, email, case_url]
      steps:
        - action: navigate
          url: "https://unicourt.com/public-records-policy"
          description: "Visit UniCourt Public Records Policy page for redaction request"
        - action: input
          value: "{case_url}"
          description: "Provide the case URL"
        - action: input
          value: "{full_name}"
          description: "Provide your full name"
        - action: input
          value: "privacy"
          description: "Provide reason for request (privacy concerns, sealed records, etc.)"
        - action: submit
          description: "Submit redaction request form"
      template_id: null
  difficulty: hard
  estimated_minutes: 20
  processing_days: 45
  legal_max_days: 90
  notes: "Public records are typically exempt from CCPA. UniCourt will only fully redact/delete records sealed or expunged by court order. For unsealed records, UniCourt may de-index URLs from search engines but records remain on platform. Only accepts requests from parties to the record, legal guardians, attorneys, or fiduciaries. Does not accept requests from reputation companies."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: false
  state_laws:
    - california

timing:
  typical_removal_days: 45
  relisting_likelihood: medium
  recheck_interval_days: 90

meta:
  added: "2026-02-25"
  last_verified: "2026-02-25"
  verified_by: web_research
  confidence: 0.80
  notes: "Court records aggregator. Public records largely exempt from privacy laws. Full removal requires court sealing/expungement order. Source: UniCourt privacy policy, public records policy."
