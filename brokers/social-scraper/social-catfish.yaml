id: social-catfish
name: Social Catfish
domain: socialcatfish.com
aliases: []
category: social-scraper
data_types:
  - name
  - email
  - phone
  - address
  - social-media
  - photos
  - age
  - relatives

scan:
  scannable: true
  method: web_search
  search_url: "https://socialcatfish.com/search/"
  detection:
    - method: text_match
      value: "results found"
      means: listed
    - method: text_match
      value: "No results"
      means: not_listed
  anti_bot:
    captcha: false
    cloudflare: true
    rate_limit_per_minute: 2

optout:
  methods:
    - type: web_form
      url: "https://socialcatfish.com/opt-out/"
      required_fields: [full_name, email, state]
      steps:
        - action: navigate
          url: "https://socialcatfish.com/opt-out/"
          description: "Go to Social Catfish opt-out page"
        - action: select
          value: "{state}"
          description: "Select your state"
        - action: input
          value: "{full_name}"
          description: "Enter your full name"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: submit
          description: "Submit opt-out request"
        - action: verify_email
          description: "Check email for confirmation from Social Catfish"
    - type: email
      email_to: NVOptOut@socialcatfish.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
  difficulty: easy
  estimated_minutes: 5
  processing_days: 15
  legal_max_days: 45
  notes: "State selection required. Confirmation emails sent after submission. Social Catfish will delete all verifiable related information within 15 days and take steps to prevent reacquisition."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
  state_laws: [california, virginia, colorado, connecticut, texas, oregon]

timing:
  typical_removal_days: 15
  relisting_likelihood: medium
  recheck_interval_days: 60

meta:
  added: "2026-02-25"
  last_verified: "2026-02-25"
  verified_by: web_research
  confidence: 0.85
  notes: "Source: socialcatfish.com/opt-out, Big Ass Data Broker Opt-Out List. People search and reverse lookup service that aggregates social media profiles, public records, and online data."
