id: uplead
name: UpLead
domain: uplead.com
aliases: []
category: social-scraper
data_types:
  - name
  - email
  - phone
  - employment
  - social-media
  - address

scan:
  scannable: false
  reason: "B2B lead generation platform. Requires paid subscription to search contacts."

optout:
  methods:
    - type: web_form
      url: "https://www.uplead.com/opt-out-request/"
      required_fields: [full_name, email]
      steps:
        - action: navigate
          url: "https://www.uplead.com/opt-out-request/"
          description: "Go to UpLead opt-out request page"
        - action: input
          value: "{full_name}"
          description: "Enter your full name"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: submit
          description: "Submit opt-out request"
    - type: email
      email_to: team@uplead.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
  difficulty: easy
  estimated_minutes: 5
  processing_days: 30
  legal_max_days: 45
  notes: "UpLead provides B2B contact and company data with real-time email verification. Fined $34,400 by California for failing to register as a data broker between February-July 2024. Additional info may be requested on a case-by-case basis to verify identity."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
  state_laws: [california, virginia]

timing:
  typical_removal_days: 30
  relisting_likelihood: medium
  recheck_interval_days: 90

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.80
  notes: "Source: California Data Broker Registry (registration #188008), uplead.com/privacy, uplead.com/opt-out-request. Fined by CPPA for late registration. Headquartered at 340 S Lemon Ave Ste 1022, Walnut, CA 91789."
