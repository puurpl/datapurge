id: fullcontact
name: FullContact
domain: fullcontact.com
aliases: []
category: social-scraper
data_types:
  - name
  - email
  - phone
  - social-media
  - photos
  - employment
  - age
  - address

scan:
  scannable: false
  reason: "B2B identity resolution API. No consumer-facing search."

optout:
  methods:
    - type: email
      email_to: privacy@fullcontact.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
    - type: web_form
      url: "https://www.fullcontact.com/privacy/privacy-portal/"
      required_fields: [full_name, email]
      steps:
        - action: navigate
          url: "https://www.fullcontact.com/privacy/privacy-portal/"
          description: "Go to FullContact Privacy Portal"
        - action: select
          value: "deletion"
          description: "Select request to delete/opt-out"
        - action: input
          value: "{full_name}"
          description: "Enter your full name"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: submit
          description: "Submit the privacy request"
  difficulty: medium
  estimated_minutes: 5
  processing_days: 30
  legal_max_days: 45
  notes: "FullContact marks data as 'hidden' and restricts processing rather than fully deleting. Profile removed from identity graph. Scrapes social media profiles including LinkedIn, Twitter, Facebook."

legal:
  ccpa: true
  gdpr: true
  registered_broker:
    california: true
  state_laws: [california, virginia, colorado, connecticut, texas, oregon]

timing:
  typical_removal_days: 30
  relisting_likelihood: medium
  recheck_interval_days: 90

meta:
  added: "2026-02-25"
  last_verified: "2026-02-25"
  verified_by: web_research
  confidence: 0.80
  notes: "Source: fullcontact.com/privacy/privacy-policy, California Data Broker Registry. Identity resolution platform that builds profiles by linking social media accounts, email addresses, and public data. Scrapes LinkedIn and other social networks."
