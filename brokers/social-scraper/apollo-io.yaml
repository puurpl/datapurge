id: apollo-io
name: Apollo.io
domain: apollo.io
aliases: []
category: social-scraper
data_types:
  - name
  - email
  - phone
  - employment
  - social-media
  - address
  - education

scan:
  scannable: false
  reason: "B2B sales intelligence platform. Requires account to search."

optout:
  methods:
    - type: web_form
      url: "https://www.apollo.io/company/privacy-center"
      required_fields: [email]
      steps:
        - action: navigate
          url: "https://www.apollo.io/company/privacy-center"
          description: "Go to Apollo.io Privacy Center"
        - action: select
          value: "opt-out"
          description: "Select opt-out or deletion request"
        - action: input
          value: "{email}"
          description: "Enter your business email address"
        - action: submit
          description: "Submit the privacy request"
        - action: verify_email
          description: "Check email for verification link from Apollo"
    - type: email
      email_to: privacy@apollo.io
      required_fields: [full_name, email]
      template_id: ccpa_maximum
  difficulty: easy
  estimated_minutes: 5
  processing_days: 30
  legal_max_days: 45
  notes: "Apollo handles deletion and opt-out requests the same way. Profile URL can be included for faster processing. Also available at apollo.io/claim/person/remove. Scrapes LinkedIn extensively."

legal:
  ccpa: true
  gdpr: true
  registered_broker:
    california: true
  state_laws: [california, virginia, colorado, connecticut, texas, oregon]

timing:
  typical_removal_days: 30
  relisting_likelihood: medium
  recheck_interval_days: 60

meta:
  added: "2026-02-25"
  last_verified: "2026-02-25"
  verified_by: web_research
  confidence: 0.85
  notes: "Source: apollo.io/privacy-policy, apollo.io/company/privacy-center, California Data Broker Registry. B2B sales intelligence with 275M+ contacts. Scrapes LinkedIn, company websites, job boards. CCPA privacy statement last updated August 2025."
