id: definitive-healthcare
name: Definitive Healthcare
domain: definitivehc.com
aliases: [preferences.definitivehc.com]
category: health
data_types:
  - name
  - address
  - phone
  - email
  - employment
  - professional-credentials
  - healthcare-affiliations
  - prescribing-patterns

scan:
  scannable: false
  reason: "B2B healthcare intelligence platform. No public consumer search. Collects data on healthcare professionals, physicians, hospitals, and clinical data."

optout:
  methods:
    - type: web_form
      url: "https://preferences.definitivehc.com/dont_sell"
      required_fields: [full_name, email]
      template_id: null
    - type: email
      email_to: privacy@definitivehc.com
      required_fields: [full_name, email, address]
      template_id: ccpa_maximum
    - type: phone
      phone_number: "774-300-8156"
      required_fields: [full_name, email]
  difficulty: medium
  estimated_minutes: 10
  processing_days: 30
  legal_max_days: 45
  notes: "Healthcare intelligence platform serving pharma, medical device, and healthcare companies. Privacy Request Form and Do Not Sell form available via DataGrail portal. Contact Data Privacy Officer at privacy@definitivehc.com or 774-300-8156."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
    vermont: true
    oregon: true
    texas: true
  state_laws: [california, virginia, colorado, connecticut, texas, oregon]

timing:
  typical_removal_days: 30
  relisting_likelihood: medium
  recheck_interval_days: 90

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.85
  notes: "Source: California Data Broker Registry, Definitive Healthcare privacy center, DataGrail opt-out portal. Registered data broker in CA, VT, OR, TX. Primarily collects healthcare professional data."
