id: databaseusa
name: DatabaseUSA
domain: databaseusa.com
aliases: [enterprise.databaseusa.com]
category: marketing-list
data_types:
  - name
  - address
  - phone
  - email
  - age
  - income-estimates
  - employment

scan:
  scannable: false
  reason: "B2B marketing list provider. No consumer-facing search. Sells targeted business and consumer mailing lists."

optout:
  methods:
    - type: web_form
      url: "https://databaseusa.com/"
      required_fields: [full_name, email, address]
    - type: phone
      phone_number: "1-877-404-0101"
      required_fields: [full_name]
  difficulty: medium
  estimated_minutes: 10
  processing_days: 30
  legal_max_days: 45
  notes: "Opt-out via 'Your California Privacy Choices' link in website footer (works for all states). Requires email confirmation. Claims 22M businesses, 43M business executives, 270M consumers. Processing takes 15-45 days."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: false
    vermont: false
  state_laws: [california]

timing:
  typical_removal_days: 30
  relisting_likelihood: medium
  recheck_interval_days: 90

meta:
  added: "2026-02-25"
  last_verified: "2026-02-25"
  verified_by: web_research
  confidence: 0.75
  notes: "Source: DatabaseUSA privacy policy, JoinDeleteMe opt-out guide. Based in Omaha, NE. Claims 98% coverage of Americans in consumer lists."
