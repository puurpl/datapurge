id: narrative-io
name: Narrative I/O
domain: narrative.io
aliases: []
category: other
data_types:
  - name
  - email
  - device-ids
  - ip-address
  - location-history

scan:
  scannable: false
  reason: "B2B data marketplace and commerce platform. No consumer-facing search. Facilitates buying and selling of consumer data between companies."

optout:
  methods:
    - type: web_form
      url: "https://www.narrative.io/privacy"
      required_fields: [email]
      steps:
        - action: navigate
          url: "https://www.narrative.io/privacy"
          description: "Go to Narrative I/O privacy page"
        - action: click
          value: "Do Not Sell or Share My Personal Information"
          description: "Click opt-out link"
        - action: input
          value: "{email}"
          description: "Enter email address"
        - action: submit
          description: "Submit opt-out request"
      template_id: null
  difficulty: medium
  estimated_minutes: 5
  processing_days: 30
  legal_max_days: 45
  notes: "Narrative I/O operates a data commerce platform where companies buy and sell consumer data. Functions as a data marketplace facilitating transactions between data providers and buyers. Opt-out may not prevent data that has already been sold to third parties from being used."

legal:
  ccpa: true
  gdpr: true
  registered_broker:
    california: true
  state_laws: [california, virginia, colorado, connecticut]

timing:
  typical_removal_days: 30
  relisting_likelihood: medium
  recheck_interval_days: 60

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.75
  notes: "B2B data commerce marketplace. Source: narrative.io/privacy."
