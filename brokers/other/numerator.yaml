id: numerator
name: Numerator
domain: numerator.com
aliases: [infoscout.co]
category: other
data_types:
  - name
  - email
  - purchase-history
  - device-ids

scan:
  scannable: false
  reason: "Consumer purchase behavior analytics platform. No public consumer search. Collects data via receipt scanning apps and panels."

optout:
  methods:
    - type: email
      email_to: privacy@numerator.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
    - type: web_form
      url: "https://www.numerator.com/privacy-notice/"
      required_fields: [email]
      steps:
        - action: navigate
          url: "https://www.numerator.com/privacy-notice/"
          description: "Go to Numerator privacy notice page"
        - action: click
          value: "Do Not Sell or Share My Personal Information"
          description: "Click the opt-out link"
        - action: input
          value: "{email}"
          description: "Enter email address"
        - action: submit
          description: "Submit opt-out request"
      template_id: null
  difficulty: easy
  estimated_minutes: 5
  processing_days: 30
  legal_max_days: 45
  notes: "Numerator tracks consumer purchase behavior via receipt scanning apps, loyalty programs, and panel data. Sells/shares identifiers, online activity, and inferences for cross-context behavioral advertising. Honors Global Privacy Control signal. Formerly InfoScout."

legal:
  ccpa: true
  gdpr: true
  registered_broker:
    california: true
  state_laws: [california, virginia, colorado, connecticut, texas, oregon]

timing:
  typical_removal_days: 30
  relisting_likelihood: medium
  recheck_interval_days: 60

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.85
  notes: "Consumer purchase behavior analytics. Formerly InfoScout. Source: numerator.com/privacy-notice, CA Data Broker Registry."
