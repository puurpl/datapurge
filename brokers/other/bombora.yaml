optout:
  methods:
    - type: web_form
      url: "https://bombora.com/opt-out/"
      required_fields: []
      steps:
        - action: navigate
          url: "https://bombora.com/opt-out/"
          description: "Go to Bombora opt-out page"
        - action: click
          description: "Click opt-out button to stop online interaction tracking by Bombora and partners"
    - type: email
      email_to: privacy@bombora.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
  difficulty: easy
  estimated_minutes: 5
  processing_days: 14
  legal_max_days: 45
  notes: "Bombora provides B2B 'intent data' that tracks what topics businesses are researching. Opt-out stops tracking of online interactions. CCPA rights include opt-out of sale and sharing of personal information."

legal:
