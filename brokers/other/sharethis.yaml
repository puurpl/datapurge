id: sharethis
name: ShareThis
domain: sharethis.com
aliases: []
category: other
data_types:
  - device-ids
  - ip-address
  - purchase-history

scan:
  scannable: false
  reason: "Ad-tech and data platform. No consumer-facing search. Tracks via sharing widgets."

optout:
  methods:
    - type: web_form
      url: "https://sharethis.com/do-not-sell-my-data-page/"
      required_fields: []
      steps:
        - action: navigate
          url: "https://sharethis.com/do-not-sell-my-data-page/"
          description: "Go to ShareThis Do Not Sell My Data page"
        - action: click
          description: "Click opt-out button to stop profiling and targeted advertising"
    - type: web_form
      url: "https://sharethis.com/ccpa-gdpr-data-subject-access-request-page/"
      required_fields: [email]
      steps:
        - action: navigate
          url: "https://sharethis.com/ccpa-gdpr-data-subject-access-request-page/"
          description: "Go to ShareThis data subject access request page"
        - action: input
          value: "{email}"
          description: "Enter your email"
        - action: submit
          description: "Submit data access or deletion request"
    - type: email
      email_to: privacy@sharethis.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
    - type: phone
      phone_number: "1-800-272-1765"
      notes: "ShareThis CCPA privacy hotline"
  difficulty: easy
  estimated_minutes: 5
  processing_days: 30
  legal_max_days: 45
  notes: "ShareThis embeds social sharing widgets on millions of websites, collecting browsing data. Do Not Sell page immediately stops profiling and targeted advertising for your browser/device. Separate form for data subject access requests (CCPA/GDPR)."

legal:
  ccpa: true
  gdpr: true
  registered_broker:
    california: true
  state_laws: [california, virginia, colorado, connecticut, texas, oregon]

timing:
  typical_removal_days: 14
  relisting_likelihood: high
  recheck_interval_days: 30

meta:
  added: "2026-02-25"
  last_verified: "2026-02-25"
  verified_by: web_research
  confidence: 0.85
  notes: "Source: sharethis.com/privacy, California Data Broker Registry. Provides social sharing buttons embedded on millions of websites. Collects browsing behavior data across sites where widgets are installed. Registered as data broker in California."
