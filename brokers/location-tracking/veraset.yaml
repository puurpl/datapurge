id: veraset
name: Veraset
domain: veraset.com
aliases: []
category: location-tracking
data_types:
  - location-history
  - device-ids

scan:
  scannable: false
  reason: "B2B location data provider. No consumer-facing search."

optout:
  methods:
    - type: web_form
      url: "https://www.veraset.com/do-not-sell-my-info"
      required_fields: [email, device-ids]
      steps:
        - action: navigate
          url: "https://www.veraset.com/do-not-sell-my-info"
          description: "Go to Veraset Do Not Sell My Info page"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: input
          value: "{advertising_id}"
          description: "Enter your mobile Advertising ID (MAID)"
        - action: submit
          description: "Submit the Do Not Sell request"
    - type: email
      email_to: privacy@veraset.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
  difficulty: hard
  estimated_minutes: 15
  processing_days: 30
  legal_max_days: 45
  notes: "Requires mobile Advertising ID for opt-out. Veraset provides raw GPS data to academic researchers, hedge funds, and government agencies."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
  state_laws: [california, virginia]

timing:
  typical_removal_days: 30
  relisting_likelihood: medium
  recheck_interval_days: 60

meta:
  added: "2026-02-25"
  last_verified: "2026-02-25"
  verified_by: web_research
  confidence: 0.75
  notes: "Source: California Data Broker Registry (registered as Veraset). Provides raw GPS location data derived from mobile devices. Clients include academic researchers, hedge funds, real estate firms, and government agencies. Data collected via SDK partners embedded in mobile apps."
