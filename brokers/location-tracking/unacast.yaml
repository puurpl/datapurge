id: unacast
name: Unacast
domain: unacast.com
aliases: []
category: location-tracking
data_types:
  - location-history
  - device-ids

scan:
  scannable: false
  reason: "B2B location analytics platform. No consumer-facing search."

optout:
  methods:
    - type: web_form
      url: "https://www.unacast.com/opt-out"
      required_fields: [email, device-ids]
      steps:
        - action: navigate
          url: "https://www.unacast.com/opt-out"
          description: "Go to Unacast Opt Out & Delete Request page"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: input
          value: "{advertising_id}"
          description: "Enter your mobile Advertising ID (MAID)"
        - action: submit
          description: "Submit the opt-out / deletion request"
    - type: email
      email_to: privacy@unacast.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
  difficulty: hard
  estimated_minutes: 10
  processing_days: 11
  legal_max_days: 45
  notes: "Median response time is 11 days, mean is 8 days. Also accepts written requests mailed to Unacast, Inc., 245 Fifth Avenue, Suite 1101, New York, NY 10016. Acquired Gravy Analytics. Parent company for Gravy Analytics location data."

legal:
  ccpa: true
  gdpr: true
  registered_broker:
    california: true
  state_laws: [california, virginia, colorado, connecticut]

timing:
  typical_removal_days: 11
  relisting_likelihood: medium
  recheck_interval_days: 60

meta:
  added: "2026-02-25"
  last_verified: "2026-02-25"
  verified_by: web_research
  confidence: 0.85
  notes: "Source: unacast.com/opt-out, unacast.com/privacy-policy, California Data Broker Registry. Location analytics company that acquired Gravy Analytics. Subject to California AG investigative sweep of location data industry. Publishes privacy request statistics (median 11 day response)."
