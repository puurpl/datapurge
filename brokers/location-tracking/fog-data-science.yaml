  notes: "Fog Data Science operates Fog Reveal, a subscription service selling geolocation data to state and local law enforcement. Buys billions of data points from tens of thousands of mobile apps. Compiles location history tied to advertising IDs. EFF investigation (2022) revealed extensive warrantless surveillance use. Company is highly secretive. Best consumer defense: disable and regularly reset advertising ID on mobile devices, limit app location permissions. Opt-out may take up to 10 business days."

