id: babel-street
name: Babel Street (Locate X)
domain: babelstreet.com
aliases: [locate-x.com]
category: location-tracking
data_types:
  - location-history
  - device-ids
  - ip-address

scan:
  scannable: false
  reason: "Government and enterprise surveillance platform. No consumer-facing product. Tracks devices via Locate X tool using advertising IDs."

optout:
  methods:
    - type: email
      email_to: privacy@babelstreet.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
    - type: web_form
      url: "https://www.babelstreet.com/privacy"
      required_fields: [email]
      steps:
        - action: navigate
          url: "https://www.babelstreet.com/privacy"
          description: "Go to Babel Street privacy page"
        - action: click
          value: "Do Not Sell or Share My Personal Information"
          description: "Click opt-out link"
        - action: input
          value: "{email}"
          description: "Enter email address"
        - action: submit
          description: "Submit opt-out request"
      template_id: null
  difficulty: hard
  estimated_minutes: 10
  processing_days: 30
  legal_max_days: 45
  notes: "Babel Street operates Locate X, a geolocation intelligence tool that tracks device location history using mobile advertising IDs. Sold to government agencies (ICE, CBP, Secret Service, FBI) without requiring warrants. Has refused to answer Congressional questions about data sourcing and whether it respects mobile device opt-outs. EFF and privacy groups have raised significant concerns. Best consumer defense is to disable advertising ID on mobile devices."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
  state_laws:
    - california

timing:
  typical_removal_days: 30
  relisting_likelihood: high
  recheck_interval_days: 30

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.70
  notes: "Government surveillance location data broker. Locate X tool used by federal agencies. Source: babelstreet.com/privacy, EFF investigations, The Intercept reporting, Congressional inquiries."
