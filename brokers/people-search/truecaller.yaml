id: truecaller
name: Truecaller
domain: truecaller.com
aliases: []
category: people-search
data_types:
  - name
  - phone
  - email
  - spam-rating
  - caller-id

scan:
  scannable: false
  method: null
  search_url: null
  notes: "Truecaller does not offer a public web search. Data is accessible via the Truecaller app only."

optout:
  methods:
    - type: web_form
      url: "https://www.truecaller.com/unlisting"
      required_fields: [phone]
      steps:
        - action: navigate
          url: "https://www.truecaller.com/unlisting"
          description: "Go to Truecaller's unlisting page"
        - action: input
          selector: "input[name='phone']"
          value: "{phone}"
          description: "Enter your phone number with country code"
        - action: select_reason
          description: "Specify your reason for opting out"
        - action: click
          description: "Click the Unlist button"
        - action: sms_verify
          description: "Copy the SMS code that appears and send it from the phone number you want to unlist"
      template_id: null
    - type: email
      email_to: support@truecaller.com
      required_fields: [full_name, phone, email]
      template_id: ccpa_maximum
    - type: account_action
      description: "If you are a Truecaller user, deactivate your account first via app Settings > Privacy > Deactivate Account before unlisting"
  difficulty: easy
  estimated_minutes: 3
  processing_days: 1
  legal_max_days: 45
  notes: "Must deactivate account FIRST if you are a Truecaller user, then unlist. The app uploads entire contact lists from users, so your number may be in their database even if you never signed up. Removal takes up to 24 hours. Number may be re-added if a contact saves you and uses the app."

legal:
  ccpa: true
  gdpr: true
  registered_broker:
    california: false
  state_laws:
    - california

timing:
  typical_removal_days: 1
  relisting_likelihood: high
  recheck_interval_days: 30

meta:
  added: "2026-02-25"
  last_verified: "2026-02-25"
  verified_by: web_research
  confidence: 0.85
  notes: "Source: Big Ass Data Broker Opt-Out List, MakeUseOf. Swedish company with 400M+ users. Collects contact data from users' address books."
