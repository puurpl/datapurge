id: officialusa
name: OfficialUSA
domain: officialusa.com
aliases: [usa-official.com]
category: people-search
data_types:
  - name
  - address
  - phone
  - age
  - relatives

scan:
  scannable: true
  method: web_search
  search_url: "https://www.officialusa.com/names/{first_name}-{last_name}/"
  detection:
    - method: selector_present
      value: ".person-item"
      means: listed
  anti_bot:
    captcha: false
    cloudflare: false
    rate_limit_per_minute: 5

optout:
  methods:
    - type: web_form
      url: "https://www.officialusa.com/opt-out"
      required_fields: [full_name, email]
      steps:
        - action: navigate
          url: "https://www.officialusa.com/opt-out"
          description: "Go to OfficialUSA opt-out page"
        - action: input
          value: "{full_name}"
          description: "Enter your full name"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: click
          description: "Submit opt-out request"
      template_id: null
    - type: email
      email_to: support@officialusa.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
  difficulty: easy
  estimated_minutes: 5
  processing_days: 7
  legal_max_days: 45
  notes: "Also covers usa-official.com. Email removal requests can be sent to support@officialusa.com."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: false
    vermont: false
  state_laws: [california, virginia, colorado]

timing:
  typical_removal_days: 7
  relisting_likelihood: medium
  recheck_interval_days: 30

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.80
  notes: "Also operates usa-official.com. Source: Big Ass Data Broker Opt-Out List, State of Surveillance"
