id: truepeoplesearch-net
name: TruePeopleSearch.net
domain: truepeoplesearch.net
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - email
  - age
  - relatives

scan:
  scannable: true
  method: web_search
  search_url: "https://www.truepeoplesearch.net/results?name={first_name}+{last_name}"
  detection:
    - method: selector_present
      value: ".card"
      means: listed
  anti_bot:
    captcha: true
    cloudflare: true
    rate_limit_per_minute: 2

optout:
  methods:
    - type: web_form
      url: "https://www.truepeoplesearch.net/removal"
      required_fields: [full_name, email]
      steps:
        - action: navigate
          url: "https://www.truepeoplesearch.net/removal"
          description: "Go to TruePeopleSearch.net removal page"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: checkbox
          description: "Agree that the record is your own"
        - action: click
          description: "Search for your record"
        - action: click
          description: "Click 'Remove This Record' at the bottom of your listing"
        - action: verify_email
          description: "Check email for confirmation link and click it"
      template_id: null
    - type: email
      email_to: support@truepeoplesearch.net
      required_fields: [full_name, email]
      template_id: ccpa_maximum
  difficulty: medium
  estimated_minutes: 10
  processing_days: 4
  legal_max_days: 45
  notes: "Separate site from truepeoplesearch.com. Multiple CAPTCHAs may be required. Data may reappear."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: false
    vermont: false
  state_laws: [california, virginia, colorado]

timing:
  typical_removal_days: 4
  relisting_likelihood: high
  recheck_interval_days: 30

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.80
  notes: "Different site from truepeoplesearch.com (.com vs .net). Source: Big Ass Data Broker Opt-Out List"
