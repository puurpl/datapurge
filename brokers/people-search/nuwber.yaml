id: nuwber
name: Nuwber
domain: nuwber.com
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - email
  - age
  - dob
  - relatives
  - criminal-records
  - property-records

scan:
  scannable: true
  method: web_search
  search_url: "https://nuwber.com/search?name={first_name}+{last_name}"
  anti_bot:
    captcha: false
    cloudflare: true
    rate_limit_per_minute: 3

optout:
  methods:
    - type: web_form
      url: "https://nuwber.com/removal/link"
      required_fields: [listing_url, email]
      requires_listing_url: true
      steps:
        - action: navigate
          url: "https://nuwber.com/removal/link"
          description: "Go to Nuwber removal page"
        - action: input
          value: "{listing_url}"
          description: "Paste the URL of your Nuwber listing"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: click
          description: "Submit removal request"
        - action: verify_email
          description: "Click CONFIRM REQUEST button in verification email"
      template_id: null
    - type: email
      email_to: support@nuwber.com
      required_fields: [full_name, email, listing_url]
      template_id: ccpa_maximum
  difficulty: medium
  estimated_minutes: 10
  processing_days: 2
  legal_max_days: 45
  notes: "Each listing URL must be removed individually if multiple exist. Email support@nuwber.com if data reappears after opt-out."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
    vermont: false
  state_laws: [california, virginia, colorado, connecticut, texas, oregon]

timing:
  typical_removal_days: 2
  relisting_likelihood: high
  recheck_interval_days: 30

meta:
  added: "2026-02-25"
  last_verified: "2026-02-25"
  verified_by: web_research
  confidence: 0.85
  notes: "Requires finding listing URL first. Multiple listings must each be removed separately. Source: Big Ass Data Broker Opt-Out List, State of Surveillance Master List"
