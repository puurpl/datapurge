id: propeoplesearch
name: ProPeopleSearch
domain: propeoplesearch.com
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - email
  - age
  - relatives
  - social-media
  - employment

scan:
  scannable: true
  method: web_search
  search_url: "https://propeoplesearch.com/search?name={first_name}+{last_name}&state={state}"
  detection:
    - method: selector_present
      value: ".search-result"
      means: listed
  anti_bot:
    captcha: false
    cloudflare: true
    rate_limit_per_minute: 3

optout:
  methods:
    - type: web_form
      url: "https://propeoplesearch.com/optout"
      required_fields: [full_name, address, phone, email]
      steps:
        - action: navigate
          url: "https://propeoplesearch.com/optout"
          description: "Go to ProPeopleSearch opt-out page"
        - action: input
          value: "{full_name}"
          description: "Enter your full name"
        - action: input
          value: "{address}"
          description: "Enter your address"
        - action: input
          value: "{phone}"
          description: "Enter your phone number"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: click
          description: "Submit opt-out form"
      template_id: null
    - type: email
      email_to: support@propeoplesearch.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
  difficulty: easy
  estimated_minutes: 3
  processing_days: 3
  legal_max_days: 45
  notes: "Uses a disposable email when contacting. Sources data from public records, court records, third-party data brokers."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: false
  state_laws:
    - california

timing:
  typical_removal_days: 3
  relisting_likelihood: high
  recheck_interval_days: 30

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.75
  notes: "Source: State of Surveillance Master List, EasyOptOuts, GuaranteedRemovals."
