id: cocofinder
name: CocoFinder
domain: cocofinder.com
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - email
  - age
  - relatives
  - criminal-records

scan:
  scannable: true
  method: web_search
  search_url: "https://cocofinder.com/people-search?first_name={first_name}&last_name={last_name}"
  detection:
    - method: selector_present
      value: ".person-card"
      means: listed
  anti_bot:
    captcha: false
    cloudflare: true
    rate_limit_per_minute: 3

optout:
  methods:
    - type: web_form
      url: "https://cocofinder.com/remove-my-info"
      required_fields: [full_name, email, listing_url]
      steps:
        - action: navigate
          url: "https://cocofinder.com/remove-my-info"
          description: "Go to CocoFinder removal page"
        - action: input
          value: "{listing_url}"
          description: "Paste the URL of your CocoFinder record"
        - action: input
          value: "{full_name}"
          description: "Enter your first and last name"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: click
          description: "Click Submit"
      template_id: null
  difficulty: easy
  estimated_minutes: 5
  processing_days: 7
  legal_max_days: 45
  notes: "Find your record first, copy its URL, then submit via the removal form. Standard processing time."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: false
    vermont: false
  state_laws: [california, virginia, colorado]

timing:
  typical_removal_days: 7
  relisting_likelihood: high
  recheck_interval_days: 30

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.80
  notes: "Source: Optery, Incogni, Comparitech opt-out guides"
