id: spyfly
name: SpyFly
domain: spyfly.com
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - email
  - age
  - relatives
  - criminal-records
  - court-records
  - property-records

scan:
  scannable: true
  method: web_search
  search_url: "https://www.spyfly.com/people-search?fname={first_name}&lname={last_name}&state={state}"
  detection:
    - method: selector_present
      value: ".search-results"
      means: listed
  anti_bot:
    captcha: false
    cloudflare: true
    rate_limit_per_minute: 3

optout:
  methods:
    - type: web_form
      url: "https://www.spyfly.com/help-center/remove-my-public-record"
      required_fields: [full_name, email]
      steps:
        - action: navigate
          url: "https://www.spyfly.com/help-center/remove-my-public-record"
          description: "Go to SpyFly removal page"
        - action: click
          description: "Click 'Get Started' button"
        - action: input
          value: "{full_name}"
          description: "Enter your full name"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: click
          description: "Submit removal request"
      template_id: null
    - type: email
      email_to: support@spyfly.com
      required_fields: [full_name, age, address, email]
      template_id: ccpa_maximum
  difficulty: easy
  estimated_minutes: 3
  processing_days: 1
  legal_max_days: 45
  notes: "Email support@spyfly.com with first name, last name, age, current address, previous address, and email. Typically processed within 24 hours."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
  state_laws:
    - california
    - virginia

timing:
  typical_removal_days: 1
  relisting_likelihood: medium
  recheck_interval_days: 30

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.85
  notes: "Fast removal (24 hours). Also provides criminal record and lawsuit data. Source: Big Ass Data Broker Opt-Out List."
