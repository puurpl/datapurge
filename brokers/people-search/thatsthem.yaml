id: thatsthem
name: ThatsThem
domain: thatsthem.com
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - email
  - age
  - ip-address

scan:
  scannable: true
  method: web_search
  search_url: "https://thatsthem.com/name/{first_name}-{last_name}"
  anti_bot:
    captcha: false
    cloudflare: false
    rate_limit_per_minute: 5

optout:
  methods:
    - type: web_form
      url: "https://thatsthem.com/optout"
      required_fields: [full_name, email, address, phone]
      steps:
        - action: navigate
          url: "https://thatsthem.com/optout"
          description: "Go to ThatsThem opt-out page"
        - action: input
          value: "{full_name}"
          description: "Enter full name"
        - action: input
          value: "{email}"
          description: "Enter email address"
        - action: input
          value: "{address}"
          description: "Enter street address, city, state, ZIP"
        - action: input
          value: "{phone}"
          description: "Enter phone number"
        - action: click
          description: "Submit opt-out request"
      template_id: null
    - type: email
      email_to: optout@thatsthem.com
      required_fields: [full_name, email, phone, address]
      template_id: ccpa_maximum
  difficulty: easy
  estimated_minutes: 5
  processing_days: 7
  legal_max_days: 45
  notes: "Free removal. Include full name, email, phone, and mailing address in email opt-out. 5-7 business day processing."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
    vermont: false
  state_laws: [california, virginia, colorado, connecticut, texas, oregon]

timing:
  typical_removal_days: 7
  relisting_likelihood: high
  recheck_interval_days: 30

meta:
  added: "2026-02-25"
  last_verified: "2026-02-25"
  verified_by: web_research
  confidence: 0.90
  notes: "Continuously pulls from public records so data may reappear. Source: Big Ass Data Broker Opt-Out List, State of Surveillance Master List"
