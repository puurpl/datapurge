id: allpeople
name: AllPeople
domain: allpeople.com
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - email
  - employment

scan:
  scannable: true
  method: web_search
  search_url: "https://allpeople.com/search?q={first_name}+{last_name}"
  detection:
    - method: selector_present
      value: ".person-result"
      means: listed
  anti_bot:
    captcha: false
    cloudflare: false
    rate_limit_per_minute: 5

optout:
  methods:
    - type: web_form
      url: "https://allpeople.com/optout"
      required_fields: [full_name, email, listing_url]
      steps:
        - action: navigate
          url: "https://allpeople.com"
          description: "Search for your name to find your profile"
        - action: navigate
          url: "https://allpeople.com/optout"
          description: "Go to opt-out page"
        - action: input
          value: "{listing_url}"
          description: "Paste the URL of your AllPeople profile"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: click
          description: "Submit removal request"
      template_id: null
  difficulty: easy
  estimated_minutes: 5
  processing_days: 7
  legal_max_days: 45
  notes: "Professional and business contact database. Find your profile URL first."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: false
    vermont: false
  state_laws: [california, virginia]

timing:
  typical_removal_days: 7
  relisting_likelihood: medium
  recheck_interval_days: 30

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.75
  notes: "Business/professional contact search. Source: Optery opt-out guides"
