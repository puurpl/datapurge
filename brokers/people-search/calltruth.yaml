id: calltruth
name: CallTruth
domain: calltruth.com
aliases: []
category: people-search
data_types:
  - name
  - phone
  - address

scan:
  scannable: true
  method: web_search
  search_url: "https://www.calltruth.com/reverse-phone-lookup.php"
  detection:
    - method: selector_present
      value: ".result"
      means: listed
  anti_bot:
    captcha: false
    cloudflare: false
    rate_limit_per_minute: 5

optout:
  methods:
    - type: web_form
      url: "https://www.calltruth.com/opt_out.php"
      required_fields: [full_name, phone, email]
      steps:
        - action: navigate
          url: "https://www.calltruth.com/opt_out.php"
          description: "Go to CallTruth opt-out page"
        - action: input
          value: "{full_name}"
          description: "Enter your full name"
        - action: input
          value: "{phone}"
          description: "Enter your phone number"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: click
          description: "Submit opt-out request"
      template_id: null
  difficulty: easy
  estimated_minutes: 5
  processing_days: 7
  legal_max_days: 45
  notes: "Reverse phone lookup service. Submit opt-out via web form."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: false
    vermont: false
  state_laws: [california]

timing:
  typical_removal_days: 7
  relisting_likelihood: medium
  recheck_interval_days: 30

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.75
  notes: "Phone lookup focused people-search site. Source: Subproject9 opt-out list"
