id: veripages
name: Veripages
domain: veripages.com
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - email
  - age
  - dob
  - relatives
  - criminal-records
  - property-records

scan:
  scannable: true
  method: web_search
  search_url: "https://veripages.com/name/{first_name}/{last_name}/"
  detection:
    - method: selector_present
      value: ".person-card"
      means: listed
  anti_bot:
    captcha: false
    cloudflare: true
    rate_limit_per_minute: 3

optout:
  methods:
    - type: web_form
      url: "https://veripages.com/inner/control-privacy"
      required_fields: [full_name, email]
      steps:
        - action: navigate
          url: "https://veripages.com/inner/control-privacy"
          description: "Go to Veripages privacy control page"
        - action: input
          value: "{full_name}"
          description: "Enter your full name"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: click
          description: "Submit opt-out request"
      template_id: null
    - type: email
      email_to: removal@veripages.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
  difficulty: easy
  estimated_minutes: 3
  processing_days: 5
  legal_max_days: 45
  notes: "Can also email support@veripages.com. Phone: (844) 217-0978. Click 'Control Profile' on any listing to opt out."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
  state_laws:
    - california
    - virginia

timing:
  typical_removal_days: 5
  relisting_likelihood: high
  recheck_interval_days: 30

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.85
  notes: "Related to Vericora network of sites. Source: State of Surveillance Master List, Security.org opt-out guide."
