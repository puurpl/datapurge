id: peopleconnect
name: PeopleConnect
domain: peopleconnect.us
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - email
  - age
  - relatives
  - social-media

scan:
  scannable: false
  method: web_search
  search_url: "https://www.peopleconnect.us"
  anti_bot:
    captcha: false
    cloudflare: false
    rate_limit_per_minute: 5

optout:
  methods:
    - type: web_form
      url: "https://suppression.peopleconnect.us/login"
      required_fields: [full_name, email]
      steps:
        - action: navigate
          url: "https://suppression.peopleconnect.us/login"
          description: "Go to PeopleConnect Suppression Center"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: verify_email
          description: "Check email for verification link and click it"
        - action: input
          value: "{full_name}"
          description: "Search for your name to find your record"
        - action: click
          description: "Select your record and confirm suppression"
      template_id: null
    - type: email
      email_to: support@mailer.intelius.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
  difficulty: easy
  estimated_minutes: 10
  processing_days: 3
  legal_max_days: 45
  notes: "Parent company of Intelius, TruthFinder, Instant Checkmate, US Search, Classmates, AnyWho, Addresses.com, AddressSearch.com, ZabaSearch, DateCheck, iSearch, LookUpAnyone, PeopleFinder, PeopleLookup, Phonesbook, Publicrecords, Spock, and more. One opt-out here covers all network sites."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
    vermont: true
  state_laws: [california, virginia, colorado, connecticut, texas, oregon]

timing:
  typical_removal_days: 3
  relisting_likelihood: medium
  recheck_interval_days: 30

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.90
  notes: "Master suppression center for 18+ people-search sites. Source: Big Ass Data Broker Opt-Out List, Kanary Blog"
