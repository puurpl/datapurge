id: smart-background-checks
name: SmartBackgroundChecks
domain: smartbackgroundchecks.com
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - email
  - age
  - dob
  - relatives
  - criminal-records
  - court-records
  - property-records

scan:
  scannable: true
  method: web_search
  search_url: "https://www.smartbackgroundchecks.com/people/{first_name}-{last_name}/{state}"
  anti_bot:
    captcha: false
    cloudflare: true
    rate_limit_per_minute: 3

optout:
  methods:
    - type: web_form
      url: "https://www.smartbackgroundchecks.com/optout"
      required_fields: [full_name, email]
      steps:
        - action: navigate
          url: "https://www.smartbackgroundchecks.com/optout"
          description: "Go to SmartBackgroundChecks opt-out page"
        - action: input
          value: "{first_name}"
          description: "Enter first name"
        - action: input
          value: "{last_name}"
          description: "Enter last name"
        - action: click
          description: "Search for your record"
        - action: click
          description: "Click Remove Record next to your listing"
        - action: input
          value: "{email}"
          description: "Provide a valid email address"
        - action: verify_email
          description: "Click confirmation link in verification email"
      template_id: null
    - type: email
      email_to: support@smartbackgroundchecks.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
  difficulty: medium
  estimated_minutes: 10
  processing_days: 7
  legal_max_days: 45
  notes: "Claims 48-hour turnaround but may take up to a week. Use a disposable email for opt-out. Data may be re-added from public sources."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
    vermont: false
  state_laws: [california, virginia, colorado, connecticut, texas, oregon]

timing:
  typical_removal_days: 7
  relisting_likelihood: high
  recheck_interval_days: 30

meta:
  added: "2026-02-25"
  last_verified: "2026-02-25"
  verified_by: web_research
  confidence: 0.80
  notes: "Background check and people search. Data re-acquisition from public sources is common. Source: Big Ass Data Broker Opt-Out List"
