id: peoplesmart
name: PeopleSmart
domain: peoplesmart.com
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - email
  - age
  - relatives

scan:
  scannable: true
  method: web_search
  search_url: "https://www.peoplesmart.com/people/{first_name}-{last_name}"
  detection:
    - method: selector_present
      value: ".person-card"
      means: listed
  anti_bot:
    captcha: false
    cloudflare: true
    rate_limit_per_minute: 3

optout:
  methods:
    - type: web_form
      url: "https://www.beenverified.com/app/optout/search"
      required_fields: [full_name, email]
      steps:
        - action: navigate
          url: "https://www.beenverified.com/app/optout/search"
          description: "Go to BeenVerified opt-out page (handles PeopleSmart removals)"
        - action: input
          value: "{full_name}"
          description: "Enter your full name"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: click
          description: "Search for your listing"
        - action: click
          description: "Select your record and submit removal"
        - action: verify_email
          description: "Check email for verification link and click it"
      template_id: null
    - type: email
      email_to: support@beenverified.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
  difficulty: easy
  estimated_minutes: 5
  processing_days: 3
  legal_max_days: 45
  notes: "Owned by BeenVerified. One opt-out per email address at BeenVerified. Email verification required."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
    vermont: true
  state_laws: [california, virginia, colorado, connecticut, texas, oregon]

timing:
  typical_removal_days: 3
  relisting_likelihood: medium
  recheck_interval_days: 30

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.85
  notes: "Owned by BeenVerified. One opt-out covers both. Source: Big Ass Data Broker Opt-Out List"
