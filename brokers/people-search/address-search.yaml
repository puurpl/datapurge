id: address-search
name: AddressSearch
domain: addresssearch.com
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - age
  - relatives

scan:
  scannable: true
  method: web_search
  search_url: "https://www.addresssearch.com/people/{first_name}-{last_name}"
  detection:
    - method: selector_present
      value: ".result-item"
      means: listed
  anti_bot:
    captcha: false
    cloudflare: false
    rate_limit_per_minute: 5

optout:
  methods:
    - type: web_form
      url: "https://suppression.peopleconnect.us/login"
      required_fields: [full_name, email]
      steps:
        - action: navigate
          url: "https://suppression.peopleconnect.us/login"
          description: "Go to PeopleConnect Suppression Center (handles AddressSearch opt-outs)"
        - action: input
          value: "{full_name}"
          description: "Enter your full name"
        - action: input
          value: "{email}"
          description: "Enter your email for verification"
        - action: click
          description: "Submit suppression request"
        - action: verify_email
          description: "Check email for confirmation link and click it"
      template_id: null
    - type: email
      email_to: support@mailer.intelius.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
  difficulty: easy
  estimated_minutes: 5
  processing_days: 3
  legal_max_days: 45
  notes: "Part of PeopleConnect/Intelius network. One opt-out at PeopleConnect Suppression Center covers AddressSearch, Intelius, TruthFinder, Instant Checkmate, US Search, AnyWho, Addresses.com, and more."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
    vermont: true
  state_laws: [california, virginia, colorado, connecticut, texas, oregon]

timing:
  typical_removal_days: 3
  relisting_likelihood: medium
  recheck_interval_days: 30

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.85
  notes: "Owned by PeopleConnect/Intelius. Removal through PeopleConnect Suppression Center. Source: Big Ass Data Broker Opt-Out List"
