id: peoplelooker
name: PeopleLooker
domain: peoplelooker.com
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - email
  - age
  - dob
  - relatives
  - criminal-records
  - court-records
  - property-records
  - social-media

scan:
  scannable: true
  method: web_search
  search_url: "https://www.peoplelooker.com/people/{first_name}-{last_name}/{state}"
  anti_bot:
    captcha: false
    cloudflare: true
    rate_limit_per_minute: 2

optout:
  methods:
    - type: web_form
      url: "https://www.peoplelooker.com/f/optout/search"
      required_fields: [first_name, last_name, state, email]
      steps:
        - action: navigate
          url: "https://www.peoplelooker.com/f/optout/search"
          description: "Go to PeopleLooker opt-out search page"
        - action: input
          value: "{first_name}"
          description: "Enter first name"
        - action: input
          value: "{last_name}"
          description: "Enter last name"
        - action: select
          value: "{state}"
          description: "Select state"
        - action: click
          description: "Search for your record"
        - action: click
          description: "Select your record and click opt-out"
        - action: verify_email
          description: "Check email from BeenVerified and click Verify Opt-Out link"
      template_id: null
    - type: email
      email_to: privacy@peoplelooker.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
  difficulty: medium
  estimated_minutes: 5
  processing_days: 1
  legal_max_days: 45
  notes: "Owned by BeenVerified. Verification email comes from BeenVerified. Contact privacy@peoplelooker.com if new records appear after opt-out."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
    vermont: true
  state_laws: [california, virginia, colorado, connecticut, texas, oregon]

timing:
  typical_removal_days: 1
  relisting_likelihood: high
  recheck_interval_days: 30

meta:
  added: "2026-02-25"
  last_verified: "2026-02-25"
  verified_by: web_research
  confidence: 0.85
  notes: "Subsidiary of BeenVerified. New records can reappear from data partners. Source: State of Surveillance Master List"
