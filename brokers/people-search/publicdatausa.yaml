id: publicdatausa
name: PublicDataUSA
domain: publicdatausa.com
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - email
  - age
  - relatives

scan:
  scannable: true
  method: web_search
  search_url: "https://www.publicdatausa.com/search.php?fname={first_name}&lname={last_name}&state={state}"
  detection:
    - method: selector_present
      value: ".record-card"
      means: listed
    - method: text_match
      value: "No results found"
      means: not_listed
  anti_bot:
    captcha: false
    cloudflare: false
    rate_limit_per_minute: 5

optout:
  methods:
    - type: web_form
      url: "https://publicdatausa.com/optout.php"
      required_fields: [full_name, email]
      steps:
        - action: navigate
          url: "https://publicdatausa.com/optout.php"
          description: "Go to PublicDataUSA opt-out page"
        - action: input
          value: "{full_name}"
          description: "Enter your full name"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: click
          description: "Submit opt-out request"
      template_id: null
    - type: email
      email_to: support@publicdatausa.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
  difficulty: easy
  estimated_minutes: 3
  processing_days: 3
  legal_max_days: 45
  notes: "Simple web form opt-out. No CAPTCHA required."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
  state_laws:
    - california

timing:
  typical_removal_days: 3
  relisting_likelihood: medium
  recheck_interval_days: 30

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.80
  notes: "Source: Big Ass Data Broker Opt-Out List, State of Surveillance Master List."
