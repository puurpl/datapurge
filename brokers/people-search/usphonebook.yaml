id: usphonebook
name: USPhoneBook
domain: usphonebook.com
aliases:
  - unitedstatesphonebook.com
category: people-search
data_types:
  - name
  - address
  - phone
  - email
  - age

scan:
  scannable: true
  method: web_search
  search_url: "https://www.usphonebook.com/{first_name}-{last_name}/{state}"
  detection:
    - method: selector_present
      value: ".result-item"
      means: listed
    - method: text_match
      value: "No results found"
      means: not_listed
  listing_extraction:
    selector: ".result-item a"
    attribute: href
  anti_bot:
    captcha: true
    cloudflare: false
    rate_limit_per_minute: 3

optout:
  methods:
    - type: web_form
      url: "https://www.usphonebook.com/opt-out"
      required_fields: [phone, email]
      steps:
        - action: navigate
          url: "https://www.usphonebook.com/opt-out"
          description: "Go to USPhoneBook opt-out page (or click 'do not sell my personal information' in footer)"
        - action: checkbox
          description: "Check the two consent boxes"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: solve_captcha
          description: "Complete the reCAPTCHA challenge"
        - action: input
          value: "{phone}"
          description: "Enter your phone number and click Search"
        - action: click
          description: "Click the red 'Remove Record' button"
        - action: verify_email
          description: "Check email and click the 'click here to remove [your name]' button"
      template_id: null
    - type: email
      email_to: support@usphonebook.com
      required_fields: [full_name, email, phone]
      template_id: ccpa_maximum
  difficulty: easy
  estimated_minutes: 5
  processing_days: 3
  legal_max_days: 45
  notes: "Search by phone number to find your listing. Requires reCAPTCHA and email verification. Removal within 72 hours. Data may reappear as databases are refreshed."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
  state_laws:
    - california

timing:
  typical_removal_days: 3
  relisting_likelihood: high
  recheck_interval_days: 30

meta:
  added: "2026-02-25"
  last_verified: "2026-02-25"
  verified_by: web_research
  confidence: 0.85
  notes: "Source: Big Ass Data Broker Opt-Out List. Phone-number-centric people search. Also check unitedstatesphonebook.com."
