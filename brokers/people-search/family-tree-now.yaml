id: family-tree-now
name: FamilyTreeNow
domain: familytreenow.com
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - age
  - dob
  - relatives
  - associates
  - property-records

scan:
  scannable: true
  method: web_search
  search_url: "https://www.familytreenow.com/search/genealogy/results?first={first_name}&last={last_name}"
  anti_bot:
    captcha: true
    cloudflare: false
    rate_limit_per_minute: 3

optout:
  methods:
    - type: web_form
      url: "https://www.familytreenow.com/optout"
      required_fields: [email, first_name, last_name, city, state, birth_year]
      steps:
        - action: navigate
          url: "https://www.familytreenow.com/optout"
          description: "Go to FamilyTreeNow opt-out page"
        - action: input
          value: "{email}"
          description: "Enter email address"
        - action: captcha
          description: "Complete CAPTCHA"
        - action: input
          value: "{first_name} {last_name}"
          description: "Enter first, middle, and last name"
        - action: input
          value: "{city}, {state}"
          description: "Enter city and state"
        - action: input
          value: "{birth_year}"
          description: "Enter birth year"
        - action: click
          description: "Click Search"
        - action: click
          description: "Click Opt Out button on your record"
        - action: verify_email
          description: "Click confirmation link in email"
      template_id: null
    - type: email
      email_to: support@familytreenow.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
  difficulty: medium
  estimated_minutes: 10
  processing_days: 3
  legal_max_days: 45
  notes: "CAPTCHA required. Opt-out removes from all places on the site. Does not remove from original public record sources."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
    vermont: false
  state_laws: [california, virginia, colorado, connecticut, texas, oregon]

timing:
  typical_removal_days: 3
  relisting_likelihood: medium
  recheck_interval_days: 60

meta:
  added: "2026-02-25"
  last_verified: "2026-02-25"
  verified_by: web_research
  confidence: 0.85
  notes: "Genealogy-focused people search. Phone support at 877-838-4889. Source: Big Ass Data Broker Opt-Out List, IntelTechniques Workbook"
