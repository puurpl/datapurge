id: idcrawl
name: IDCrawl
domain: idcrawl.com
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - email
  - social-media
  - photos
  - employment

scan:
  scannable: true
  method: web_search
  search_url: "https://www.idcrawl.com/{first_name}-{last_name}"
  detection:
    - method: selector_present
      value: ".result-card"
      means: listed
    - method: text_match
      value: "No results"
      means: not_listed
  anti_bot:
    captcha: false
    cloudflare: false
    rate_limit_per_minute: 5

optout:
  methods:
    - type: web_form
      url: "https://www.idcrawl.com/opt-out"
      required_fields: [email, listing_url]
      requires_listing_url: true
      steps:
        - action: navigate
          url: "https://www.idcrawl.com/opt-out"
          description: "Go to IDCrawl opt-out page"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: input
          value: "{listing_url}"
          description: "Enter the URL of the IDCrawl page with your information"
        - action: click
          description: "Submit removal request"
        - action: verify_email
          description: "Check email for confirmation link from IDCrawl"
      template_id: null
    - type: email
      email_to: support@idcrawl.com
      required_fields: [full_name, email, listing_url]
      template_id: ccpa_maximum
  difficulty: easy
  estimated_minutes: 3
  processing_days: 2
  legal_max_days: 45
  notes: "Self-described as 'privacy-friendly' people search engine. Only displays publicly published information. Servers refresh in 24-48 hours after opt-out."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
  state_laws:
    - california

timing:
  typical_removal_days: 2
  relisting_likelihood: medium
  recheck_interval_days: 30

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.85
  notes: "Aggregates social media profiles and public web data. Source: Optery, MyDataRemoval, DeleteMe."
