id: locatepeople
name: LocatePeople.org
domain: locatepeople.org
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - email
  - education
  - location-history

scan:
  scannable: true
  method: web_search
  search_url: "https://www.locatepeople.org/search/?fn={first_name}&ln={last_name}"
  detection:
    - method: selector_present
      value: ".search-result"
      means: listed
    - method: text_match
      value: "No results"
      means: not_listed
  listing_extraction:
    selector: ".search-result a"
    attribute: href
  anti_bot:
    captcha: false
    cloudflare: false
    rate_limit_per_minute: 5

optout:
  methods:
    - type: web_form
      url: "https://www.locatepeople.org/optout/"
      required_fields: [full_name, email]
      steps:
        - action: navigate
          url: "https://www.locatepeople.org/optout/"
          description: "Go to LocatePeople opt-out page"
        - action: input
          value: "{full_name}"
          description: "Fill in the opt-out form with your data"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: click
          description: "Submit the opt-out request"
        - action: verify_email
          description: "Check email for verification link and click it to complete the request"
      template_id: null
    - type: email
      email_to: privacy@locatepeople.org
      required_fields: [full_name, email]
      template_id: ccpa_maximum
  difficulty: easy
  estimated_minutes: 3
  processing_days: 7
  legal_max_days: 45
  notes: "Fill out the opt-out form and confirm via email verification link. Features contact details, location history, and education records for US residents."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: false
  state_laws:
    - california

timing:
  typical_removal_days: 7
  relisting_likelihood: medium
  recheck_interval_days: 30

meta:
  added: "2026-02-25"
  last_verified: "2026-02-25"
  verified_by: web_research
  confidence: 0.75
  notes: "Source: Incogni opt-out guides, Optery. People-search directory focused on US residents."
