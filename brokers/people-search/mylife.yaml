id: mylife
name: MyLife
domain: mylife.com
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - email
  - age
  - dob
  - relatives
  - associates
  - employment
  - education
  - criminal-records
  - court-records
  - property-records
  - social-media

scan:
  scannable: true
  method: web_search
  search_url: "https://www.mylife.com/pub/search.pub?search={first_name}+{last_name}"
  anti_bot:
    captcha: false
    cloudflare: true
    rate_limit_per_minute: 2

optout:
  methods:
    - type: web_form
      url: "https://www.mylife.com/ccpa/index.pubview"
      required_fields: [full_name, email]
      steps:
        - action: navigate
          url: "https://www.mylife.com/ccpa/index.pubview"
          description: "Go to MyLife CCPA opt-out page"
        - action: input
          value: "{full_name}"
          description: "Enter full name"
        - action: input
          value: "{email}"
          description: "Enter email"
        - action: click
          description: "Submit request"
      template_id: null
    - type: email
      email_to: privacy@mylife.com
      required_fields: [full_name, email, listing_url]
      template_id: ccpa_maximum
    - type: email
      email_to: customercare@mylife.com
      required_fields: [full_name, email, listing_url]
      template_id: ccpa_maximum
  difficulty: hard
  estimated_minutes: 15
  processing_days: 14
  legal_max_days: 45
  notes: "Include profile link in email requests. If form does not work, email privacy@mylife.com or customercare@mylife.com. Removal usually takes 7-14 business days, up to 30 days."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
    vermont: true
  state_laws: [california, virginia, colorado, connecticut, texas, oregon]

timing:
  typical_removal_days: 14
  relisting_likelihood: high
  recheck_interval_days: 30

meta:
  added: "2026-02-25"
  last_verified: "2026-02-25"
  verified_by: web_research
  confidence: 0.85
  notes: "Assigns reputation scores to individuals. Difficult opt-out process. Source: Big Ass Data Broker Opt-Out List, State of Surveillance Master List"
