id: checkpeople
name: CheckPeople
domain: checkpeople.com
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - email
  - age
  - dob
  - relatives
  - criminal-records
  - court-records
  - property-records

scan:
  scannable: true
  method: web_search
  search_url: "https://checkpeople.com/result?name={first_name}+{last_name}"
  anti_bot:
    captcha: true
    cloudflare: false
    rate_limit_per_minute: 3

optout:
  methods:
    - type: web_form
      url: "https://checkpeople.com/do-not-sell-info/"
      required_fields: [full_name, address, email]
      steps:
        - action: navigate
          url: "https://checkpeople.com/do-not-sell-info/"
          description: "Go to CheckPeople Do Not Sell page (or click link in footer)"
        - action: input
          value: "{full_name}"
          description: "Enter your full name"
        - action: input
          value: "{address}"
          description: "Enter your address"
        - action: captcha
          description: "Complete CAPTCHA"
        - action: click
          description: "Search for your record"
        - action: click
          description: "Click Remove Record"
        - action: verify_email
          description: "Check email for Confirm Request button and click it"
      template_id: null
    - type: email
      email_to: support@checkpeople.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
    - type: phone
      phone_number: "1-800-267-2122"
  difficulty: medium
  estimated_minutes: 10
  processing_days: 7
  legal_max_days: 45
  notes: "Opt-out requests take 5-7 days. Confirmation email may go to spam folder. Can also contact via phone at (800) 267-2122."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
    vermont: false
  state_laws: [california, virginia, colorado, connecticut, texas, oregon]

timing:
  typical_removal_days: 7
  relisting_likelihood: high
  recheck_interval_days: 30

meta:
  added: "2026-02-25"
  last_verified: "2026-02-25"
  verified_by: web_research
  confidence: 0.85
  notes: "Background check and people search service. Source: Big Ass Data Broker Opt-Out List, State of Surveillance Master List"
