id: peekyou
name: PeekYou
domain: peekyou.com
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - email
  - age
  - social-media
  - employment
  - photos
  - web-profiles

scan:
  scannable: true
  method: web_search
  search_url: "https://www.peekyou.com/{first_name}_{last_name}/{state}"
  detection:
    - method: selector_present
      value: ".result-card"
      means: listed
    - method: text_match
      value: "No results"
      means: not_listed
  listing_extraction:
    selector: ".result-card a"
    attribute: href
  anti_bot:
    captcha: true
    cloudflare: false
    rate_limit_per_minute: 3

optout:
  methods:
    - type: web_form
      url: "https://www.peekyou.com/about/contact/optout/"
      required_fields: [full_name, email, listing_url]
      requires_listing_url: true
      steps:
        - action: navigate
          url: "https://www.peekyou.com"
          description: "Search for your name on PeekYou"
        - action: copy_url
          description: "Copy your unique profile ID from the URL"
        - action: navigate
          url: "https://www.peekyou.com/about/contact/optout/"
          description: "Go to PeekYou opt-out page (link in footer: Do Not Sell My Personal Information)"
        - action: input
          value: "{full_name}"
          description: "Enter your full name"
        - action: input
          value: "{email}"
          description: "Enter your email for confirmation"
        - action: input
          value: "{listing_url}"
          description: "Enter your profile URL or unique ID"
        - action: solve_captcha
          description: "Complete the CAPTCHA"
        - action: click
          description: "Submit the opt-out request"
        - action: verify_email
          description: "Check email for verification link from PeekYou"
      template_id: null
    - type: email
      email_to: privacy@peekyou.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
  difficulty: easy
  estimated_minutes: 5
  processing_days: 3
  legal_max_days: 45
  notes: "Find your profile via search, then use the Do Not Sell link in the footer. Requires CAPTCHA and email verification. Information may reappear if databases are refreshed."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
    vermont: true
  state_laws:
    - california

timing:
  typical_removal_days: 5
  relisting_likelihood: medium
  recheck_interval_days: 30

meta:
  added: "2026-02-25"
  last_verified: "2026-02-25"
  verified_by: web_research
  confidence: 0.85
  notes: "Source: Big Ass Data Broker Opt-Out List, DataBrokersWatch.org. Aggregates social media profiles and web presence data."
