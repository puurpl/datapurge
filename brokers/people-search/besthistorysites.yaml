id: besthistorysites
name: BestHistorySites
domain: besthistorysites.net
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone

scan:
  scannable: true
  method: web_search
  search_url: "https://besthistorysites.net/search?name={first_name}+{last_name}"
  detection:
    - method: selector_present
      value: ".result"
      means: listed
  anti_bot:
    captcha: false
    cloudflare: false
    rate_limit_per_minute: 5

optout:
  methods:
    - type: web_form
      url: "https://besthistorysites.net/opt-out"
      required_fields: [email, listing_url]
      steps:
        - action: navigate
          url: "https://besthistorysites.net"
          description: "Search for your name to find your listing"
        - action: navigate
          url: "https://besthistorysites.net/opt-out"
          description: "Go to the opt-out page"
        - action: input
          value: "{listing_url}"
          description: "Paste your result URL"
        - action: input
          value: "{email}"
          description: "Enter your email"
        - action: click
          description: "Submit opt-out"
        - action: verify_email
          description: "Click removal link in confirmation email"
      template_id: null
  difficulty: easy
  estimated_minutes: 5
  processing_days: 7
  legal_max_days: 45
  notes: "Paste result URL, enter email, click removal link in email."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: false
    vermont: false
  state_laws: [california]

timing:
  typical_removal_days: 7
  relisting_likelihood: low
  recheck_interval_days: 60

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.70
  notes: "Source: Big Ass Data Broker Opt-Out List"
