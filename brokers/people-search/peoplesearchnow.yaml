id: peoplesearchnow
name: PeopleSearchNow
domain: peoplesearchnow.com
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - email
  - age
  - relatives
  - criminal-records

scan:
  scannable: true
  method: web_search
  search_url: "https://www.peoplesearchnow.com/person/{first_name}-{last_name}"
  detection:
    - method: selector_present
      value: ".search-result"
      means: listed
    - method: text_match
      value: "No results"
      means: not_listed
  anti_bot:
    captcha: true
    cloudflare: false
    rate_limit_per_minute: 3

optout:
  methods:
    - type: web_form
      url: "https://www.peoplesearchnow.com/opt-out"
      required_fields: [email]
      steps:
        - action: navigate
          url: "https://www.peoplesearchnow.com/opt-out"
          description: "Go to PeopleSearchNow opt-out page"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: captcha
          description: "Complete CAPTCHA challenge"
        - action: click
          description: "Click 'Opt out my info'"
      template_id: null
    - type: email
      email_to: privacy@peoplesearchnow.com
      required_fields: [full_name, email, address]
      template_id: ccpa_maximum
  difficulty: easy
  estimated_minutes: 3
  processing_days: 3
  legal_max_days: 45
  notes: "Record should be removed within 72 hours. Email opt-out with subject 'Request for deletion of my data' also works."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
  state_laws:
    - california
    - virginia

timing:
  typical_removal_days: 3
  relisting_likelihood: high
  recheck_interval_days: 30

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.85
  notes: "Source: State of Surveillance Master List, Incogni opt-out guides."
