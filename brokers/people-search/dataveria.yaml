id: dataveria
name: Dataveria
domain: dataveria.com
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - email
  - age
  - dob
  - relatives
  - criminal-records
  - property-records
  - social-media
  - employment

scan:
  scannable: true
  method: web_search
  search_url: "https://dataveria.com/profile/{first_name}-{last_name}"
  detection:
    - method: selector_present
      value: ".profile-card"
      means: listed
  anti_bot:
    captcha: false
    cloudflare: true
    rate_limit_per_minute: 3

optout:
  methods:
    - type: web_form
      url: "https://dataveria.com/ng/control/privacy"
      required_fields: [full_name, email, listing_url]
      requires_listing_url: true
      steps:
        - action: navigate
          url: "https://dataveria.com"
          description: "Go to Dataveria and search for your name"
        - action: input
          value: "{full_name}"
          description: "Search for your profile"
        - action: click
          description: "Click your profile and copy the URL"
        - action: navigate
          url: "https://dataveria.com/ng/control/privacy"
          description: "Go to privacy control page"
        - action: input
          value: "{listing_url}"
          description: "Paste your profile URL"
        - action: input
          value: "{full_name}"
          description: "Enter your full name"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: click
          description: "Submit opt-out request"
        - action: verify_email
          description: "Click verification link in email"
      template_id: null
    - type: email
      email_to: support@dataveria.com
      required_fields: [full_name, listing_url]
      template_id: ccpa_maximum
  difficulty: medium
  estimated_minutes: 5
  processing_days: 5
  legal_max_days: 45
  notes: "Can also email customer@dataveria.com. Requires profile URL for removal. Only removes from Dataveria, not from connected sites."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
  state_laws:
    - california
    - virginia

timing:
  typical_removal_days: 5
  relisting_likelihood: high
  recheck_interval_days: 30

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.80
  notes: "Connected to backgroundcheck.run, clubset.com, councilon.com, newenglandfacts.com, and wellnut.com. Source: Big Ass Data Broker Opt-Out List, Optery."
