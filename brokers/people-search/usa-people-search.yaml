id: usa-people-search
name: USA People Search
domain: usa-people-search.com
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - email
  - age
  - relatives
  - criminal-records
  - property-records

scan:
  scannable: true
  method: web_search
  search_url: "https://www.usa-people-search.com/people/{first_name}-{last_name}/{state}"
  detection:
    - method: selector_present
      value: ".people-result"
      means: listed
    - method: text_match
      value: "No results"
      means: not_listed
  anti_bot:
    captcha: true
    cloudflare: false
    rate_limit_per_minute: 3

optout:
  methods:
    - type: web_form
      url: "https://www.usa-people-search.com/manage"
      required_fields: [first_name, last_name, city, state, email]
      steps:
        - action: navigate
          url: "https://www.usa-people-search.com/manage"
          description: "Go to the USA People Search manage page"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: click
          description: "Agree to terms and conditions"
        - action: captcha
          description: "Complete CAPTCHA challenge"
        - action: input
          value: "{first_name} {last_name}"
          description: "Search for your name"
        - action: click
          description: "Click 'remove record' on your listing"
        - action: verify_email
          description: "Check email for confirmation link (expires in 24 hours)"
      template_id: null
    - type: email
      email_to: support@usa-people-search.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
  difficulty: medium
  estimated_minutes: 5
  processing_days: 3
  legal_max_days: 45
  notes: "Email confirmation link expires in 24 hours. Opt-out processed within 72 hours. Data may reappear from original public sources."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
  state_laws:
    - california
    - virginia
    - colorado

timing:
  typical_removal_days: 3
  relisting_likelihood: high
  recheck_interval_days: 30

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.80
  notes: "Source: State of Surveillance Master List, Big Ass Data Broker Opt-Out List. Phone: (800) 248-1544."
