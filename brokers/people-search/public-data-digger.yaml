id: public-data-digger
name: PublicDataDigger
domain: publicdatadigger.com
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - age
  - relatives
  - criminal-records

scan:
  scannable: true
  method: web_search
  search_url: "https://publicdatadigger.com/people/{first_name}-{last_name}"
  detection:
    - method: selector_present
      value: ".person-card"
      means: listed
  anti_bot:
    captcha: false
    cloudflare: true
    rate_limit_per_minute: 3

optout:
  methods:
    - type: web_form
      url: "https://publicdatadigger.com/removeprofile"
      required_fields: [full_name, email]
      steps:
        - action: navigate
          url: "https://publicdatadigger.com/removeprofile"
          description: "Go to PublicDataDigger removal page"
        - action: input
          value: "{full_name}"
          description: "Enter your full name"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: click
          description: "Submit removal request"
      template_id: null
    - type: email
      email_to: support@publicdatadigger.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
  difficulty: easy
  estimated_minutes: 5
  processing_days: 7
  legal_max_days: 45
  notes: "Standard web form and email opt-out available."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: false
    vermont: false
  state_laws: [california, virginia]

timing:
  typical_removal_days: 7
  relisting_likelihood: high
  recheck_interval_days: 30

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.75
  notes: "Source: web research, opt-out guide aggregators"
