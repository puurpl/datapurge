id: xlek
name: Xlek
domain: xlek.com
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - age
  - relatives

scan:
  scannable: true
  method: web_search
  search_url: "https://www.xlek.com/search?first={first_name}&last={last_name}"
  detection:
    - method: selector_present
      value: ".result-item"
      means: listed
  anti_bot:
    captcha: true
    cloudflare: false
    rate_limit_per_minute: 5

optout:
  methods:
    - type: web_form
      url: "https://www.xlek.com/optout"
      required_fields: [full_name, email]
      steps:
        - action: navigate
          url: "https://www.xlek.com"
          description: "Search for your name with first name, last name, and state"
        - action: click
          description: "Click on your listing to get the profile URL"
        - action: navigate
          url: "https://www.xlek.com/optout"
          description: "Go to the opt-out page"
        - action: input
          value: "{full_name}"
          description: "Enter your first name, last name"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: captcha
          description: "Complete the CAPTCHA"
        - action: click
          description: "Click Proceed"
      template_id: null
  difficulty: easy
  estimated_minutes: 5
  processing_days: 7
  legal_max_days: 45
  notes: "Profile should be removed within a week. If not removed after 1 week, contact their support team via the Contact page. Staff will remove data within 30 days."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: false
    vermont: false
  state_laws: [california, virginia]

timing:
  typical_removal_days: 7
  relisting_likelihood: medium
  recheck_interval_days: 30

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.80
  notes: "Formerly related to OfficialUSA. Source: Optery, Onerep opt-out guides"
