id: centeda
name: Centeda
domain: centeda.com
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - age
  - relatives

scan:
  scannable: true
  method: web_search
  search_url: "https://centeda.com/people/{first_name}-{last_name}"
  detection:
    - method: selector_present
      value: ".person-card"
      means: listed
  anti_bot:
    captcha: true
    cloudflare: true
    rate_limit_per_minute: 3

optout:
  methods:
    - type: web_form
      url: "https://centeda.com/ng/control/privacy"
      required_fields: [full_name, email, listing_url]
      steps:
        - action: navigate
          url: "https://centeda.com/ng/control/privacy"
          description: "Go to Centeda privacy control page"
        - action: input
          value: "{listing_url}"
          description: "Paste the URL of your listing"
        - action: input
          value: "{full_name}"
          description: "Enter your full name"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: captcha
          description: "Complete the CAPTCHA"
        - action: click
          description: "Click 'Submit Opt Out Request'"
        - action: verify_email
          description: "Check email for verification link and click it"
      template_id: null
    - type: email
      email_to: support@centeda.com
      required_fields: [full_name, email, listing_url]
      template_id: ccpa_maximum
  difficulty: medium
  estimated_minutes: 10
  processing_days: 7
  legal_max_days: 45
  notes: "CAPTCHA and email verification required. Paste listing URL into the opt-out form."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: false
    vermont: false
  state_laws: [california, virginia, colorado]

timing:
  typical_removal_days: 7
  relisting_likelihood: high
  recheck_interval_days: 30

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.80
  notes: "Source: Onerep removal guide, Incogni opt-out list"
