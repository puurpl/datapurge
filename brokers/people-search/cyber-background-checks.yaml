id: cyber-background-checks
name: CyberBackgroundChecks
domain: cyberbackgroundchecks.com
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - email
  - age
  - dob
  - relatives
  - criminal-records
  - court-records
  - property-records

scan:
  scannable: true
  method: web_search
  search_url: "https://www.cyberbackgroundchecks.com/people/{first_name}-{last_name}/{state}"
  anti_bot:
    captcha: true
    cloudflare: false
    rate_limit_per_minute: 3

optout:
  methods:
    - type: web_form
      url: "https://www.cyberbackgroundchecks.com/removal"
      required_fields: [full_name, email]
      steps:
        - action: navigate
          url: "https://www.cyberbackgroundchecks.com/removal"
          description: "Go to CyberBackgroundChecks removal page"
        - action: input
          value: "{full_name}"
          description: "Enter your full name"
        - action: input
          value: "{email}"
          description: "Enter email address"
        - action: verify_email
          description: "Click confirmation link in email"
        - action: captcha
          description: "Complete CAPTCHA"
        - action: click
          description: "Submit suppression form"
      template_id: null
    - type: email
      email_to: support@cyberbackgroundchecks.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
  difficulty: medium
  estimated_minutes: 10
  processing_days: 3
  legal_max_days: 45
  notes: "CCPA removal page at /ccparemoval. Typically removes within 12-24 hours but may take up to 3 days. Profile can return as new records appear."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
    vermont: false
  state_laws: [california, virginia, colorado, connecticut, texas, oregon]

timing:
  typical_removal_days: 3
  relisting_likelihood: high
  recheck_interval_days: 30

meta:
  added: "2026-02-25"
  last_verified: "2026-02-25"
  verified_by: web_research
  confidence: 0.85
  notes: "Also has CCPA-specific removal at /ccparemoval. Source: State of Surveillance Master List, IntelTechniques Workbook"
