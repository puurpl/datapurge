id: truthfinder
name: TruthFinder
domain: truthfinder.com
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - email
  - age
  - dob
  - relatives
  - criminal-records
  - court-records
  - property-records
  - social-media

scan:
  scannable: true
  method: web_search
  search_url: "https://www.truthfinder.com/results/?firstName={first_name}&lastName={last_name}"
  detection:
    - method: selector_present
      value: ".person-card"
      means: listed
  anti_bot:
    captcha: true
    cloudflare: true
    rate_limit_per_minute: 2

optout:
  methods:
    - type: web_form
      url: "https://suppression.peopleconnect.us/login"
      required_fields: [full_name, email, dob]
      steps:
        - action: navigate
          url: "https://www.truthfinder.com"
          description: "Scroll to footer, click 'Exercise My Data Privacy Rights'"
        - action: click
          description: "Click 'View Public Data Tools' button"
        - action: click
          description: "Click 'Manage My Suppression Rules'"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: verify_email
          description: "Check email for verification link and click it"
        - action: input
          value: "{full_name}"
          description: "Enter full legal name"
        - action: input
          value: "{dob}"
          description: "Enter date of birth"
        - action: click
          description: "Find and select your record, then submit suppression"
      template_id: null
    - type: email
      email_to: support@mailer.intelius.com
      required_fields: [full_name, email, dob]
      template_id: ccpa_maximum
  difficulty: medium
  estimated_minutes: 10
  processing_days: 2
  legal_max_days: 45
  notes: "Part of PeopleConnect network. Opt-out also removes from Intelius, Instant Checkmate, US Search, Classmates, AnyWho, Addresses.com, AddressSearch, ZabaSearch, and more. Email verification required."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
    vermont: true
  state_laws: [california, virginia, colorado, connecticut, texas, oregon]

timing:
  typical_removal_days: 2
  relisting_likelihood: medium
  recheck_interval_days: 30

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.90
  notes: "Major people-search site owned by PeopleConnect. Source: Big Ass Data Broker Opt-Out List, State of Surveillance Master List"
