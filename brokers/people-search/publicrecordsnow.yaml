id: publicrecordsnow
name: PublicRecordsNow
domain: publicrecordsnow.com
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - email
  - age
  - relatives
  - criminal-records
  - bankruptcy-records
  - marriage-records
  - divorce-records

scan:
  scannable: true
  method: web_search
  search_url: "https://www.publicrecordsnow.com/search/{first_name}-{last_name}"
  detection:
    - method: selector_present
      value: ".search-result"
      means: listed
  anti_bot:
    captcha: true
    cloudflare: false
    rate_limit_per_minute: 3

optout:
  methods:
    - type: web_form
      url: "https://www.publicrecordsnow.com/static/view/optout/"
      required_fields: [full_name, email]
      steps:
        - action: navigate
          url: "https://www.publicrecordsnow.com/static/view/optout/"
          description: "Go to PublicRecordsNow opt-out page"
        - action: input
          value: "{full_name}"
          description: "Enter your full name"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: captcha
          description: "Complete CAPTCHA"
        - action: click
          description: "Click 'Opt out'"
      template_id: null
    - type: email
      email_to: support@publicrecordsnow.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
  difficulty: easy
  estimated_minutes: 3
  processing_days: 3
  legal_max_days: 45
  notes: "Can also use Contact Us page and select 'OPT ME OUT' as subject. Mailing address: P.O. Box 110850, Naples, FL 34108. Related to PeopleFinders."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
  state_laws:
    - california
    - virginia

timing:
  typical_removal_days: 3
  relisting_likelihood: high
  recheck_interval_days: 30

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.80
  notes: "Related to PeopleFinders network. Data may reappear. Source: Optery, Incogni, Onerep."
