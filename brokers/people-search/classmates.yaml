id: classmates
name: Classmates
domain: classmates.com
aliases: []
category: people-search
data_types:
  - name
  - photos
  - social-media
  - employment

scan:
  scannable: true
  method: web_search
  search_url: "https://www.classmates.com/siteui/sch/search?q={first_name}+{last_name}"
  detection:
    - method: selector_present
      value: ".search-result"
      means: listed
  anti_bot:
    captcha: false
    cloudflare: false
    rate_limit_per_minute: 5

optout:
  methods:
    - type: web_form
      url: "https://suppression.peopleconnect.us/login"
      required_fields: [full_name, email]
      steps:
        - action: navigate
          url: "https://suppression.peopleconnect.us/login"
          description: "Go to PeopleConnect Suppression Center"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: verify_email
          description: "Check email for verification link and click it"
        - action: input
          value: "{full_name}"
          description: "Enter your full name to find your record"
        - action: click
          description: "Select your record and submit suppression request"
      template_id: null
    - type: email
      email_to: support@mailer.intelius.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
  difficulty: easy
  estimated_minutes: 5
  processing_days: 3
  legal_max_days: 45
  notes: "Part of PeopleConnect network. Can also cancel membership directly at help.classmates.com/hc/en-us/articles/115002224171. Suppression via PeopleConnect covers all network sites."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
    vermont: true
  state_laws: [california, virginia, colorado, connecticut, texas, oregon]

timing:
  typical_removal_days: 3
  relisting_likelihood: low
  recheck_interval_days: 60

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.85
  notes: "School reunion/alumni network. Part of PeopleConnect/Intelius. Source: Big Ass Data Broker Opt-Out List"
