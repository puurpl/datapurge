id: find-people-fast
name: FindPeopleFast
domain: findpeoplefast.net
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - age
  - relatives

scan:
  scannable: true
  method: web_search
  search_url: "https://www.findpeoplefast.net/name/{first_name}-{last_name}"
  detection:
    - method: selector_present
      value: ".person-card"
      means: listed
  anti_bot:
    captcha: false
    cloudflare: true
    rate_limit_per_minute: 3

optout:
  methods:
    - type: web_form
      url: "https://www.findpeoplefast.net/optout"
      required_fields: [full_name, email]
      steps:
        - action: navigate
          url: "https://www.findpeoplefast.net/optout"
          description: "Go to FindPeopleFast opt-out page"
        - action: input
          value: "{full_name}"
          description: "Enter your full name"
        - action: input
          value: "{email}"
          description: "Enter your email"
        - action: click
          description: "Submit opt-out request"
      template_id: null
    - type: email
      email_to: support@findpeoplefast.net
      required_fields: [full_name, email]
      template_id: ccpa_maximum
  difficulty: easy
  estimated_minutes: 5
  processing_days: 2
  legal_max_days: 45
  notes: "Listing should be removed within 24-48 hours."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: false
    vermont: false
  state_laws: [california, virginia, colorado]

timing:
  typical_removal_days: 2
  relisting_likelihood: high
  recheck_interval_days: 30

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.80
  notes: "Source: Onerep, GuaranteedRemovals opt-out guides"
