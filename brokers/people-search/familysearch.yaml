id: familysearch
name: FamilySearch
domain: familysearch.org
aliases: []
category: people-search
data_types:
  - name
  - dob
  - relatives
  - address

scan:
  scannable: false
  method: web_search
  search_url: "https://www.familysearch.org/en/search/?q.givenName={first_name}&q.surname={last_name}"
  anti_bot:
    captcha: false
    cloudflare: false
    rate_limit_per_minute: 5

optout:
  methods:
    - type: web_form
      url: "https://submit-irm.trustarc.com/services/validation/b8d6e704-e5b1-42a0-9f86-bbdec35939a1"
      required_fields: [full_name, email]
      steps:
        - action: navigate
          url: "https://www.familysearch.org"
          description: "Create a free account and search for your records"
        - action: navigate
          url: "https://submit-irm.trustarc.com/services/validation/b8d6e704-e5b1-42a0-9f86-bbdec35939a1"
          description: "Go to the TrustArc privacy form"
        - action: input
          value: "{full_name}"
          description: "Enter your name"
        - action: input
          value: "{email}"
          description: "Enter your email"
        - action: input
          value: "{listing_url}"
          description: "Submit URLs of records containing your information"
        - action: click
          description: "Submit removal request"
        - action: verify_email
          description: "Email verification required"
      template_id: null
  difficulty: hard
  estimated_minutes: 20
  processing_days: 30
  legal_max_days: 45
  notes: "Operated by The Church of Jesus Christ of Latter-day Saints. Requires creating a free account first to find records, then submitting URLs via TrustArc privacy form."

legal:
  ccpa: true
  gdpr: true
  registered_broker:
    california: false
    vermont: false
  state_laws: [california, virginia]

timing:
  typical_removal_days: 30
  relisting_likelihood: low
  recheck_interval_days: 90

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.75
  notes: "Genealogy service. Source: Big Ass Data Broker Opt-Out List"
