id: freepeopledirectory
name: FreePeopleDirectory
domain: freepeopledirectory.com
aliases: []
category: people-search
data_types:
  - name
  - address
  - phone
  - email
  - age
  - relatives

scan:
  scannable: true
  method: web_search
  search_url: "https://www.freepeopledirectory.com/name/{first_name}-{last_name}"
  detection:
    - method: selector_present
      value: ".result-card"
      means: listed
    - method: text_match
      value: "No results"
      means: not_listed
  anti_bot:
    captcha: false
    cloudflare: false
    rate_limit_per_minute: 5

optout:
  methods:
    - type: web_form
      url: "https://www.freepeopledirectory.com/optout"
      required_fields: [listing_url, email]
      requires_listing_url: true
      steps:
        - action: navigate
          url: "https://www.freepeopledirectory.com/optout"
          description: "Go to FreePeopleDirectory opt-out page"
        - action: input
          value: "{listing_url}"
          description: "Enter the URL of your listing"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: click
          description: "Submit removal request"
      template_id: null
    - type: email
      email_to: support@freepeopledirectory.com
      required_fields: [full_name, email, listing_url]
      template_id: ccpa_maximum
  difficulty: easy
  estimated_minutes: 3
  processing_days: 1
  legal_max_days: 45
  notes: "Owned by Spokeo. Opting out of Spokeo automatically opts out of FreePeopleDirectory. Removal happens in real time. Received 687,774 opt-out requests in 2023."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
  state_laws:
    - california
    - virginia

timing:
  typical_removal_days: 1
  relisting_likelihood: medium
  recheck_interval_days: 30

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.85
  notes: "Owned by Spokeo. Opt-out from Spokeo covers this site too. Source: Optery, Big Ass Data Broker Opt-Out List."
