id: targetsmart
name: TargetSmart
domain: targetsmart.com
aliases: [privacy.targetsmart.com]
category: political
data_types:
  - name
  - address
  - phone
  - email
  - dob
  - voter-registration
  - party-affiliation
  - voting-history
  - consumer-interests
  - lifestyle
  - social-profiles
  - employment
  - demographic

scan:
  scannable: false
  reason: "Political data and analytics provider. No public consumer search. Provides voter data to campaigns, PACs, nonprofits, and political organizations."

optout:
  methods:
    - type: web_form
      url: "https://privacy.targetsmart.com/do-not-sell-my-personal-information"
      required_fields: [full_name, email, address]
      template_id: null
      notes: "Must complete the online form and verify via email confirmation link. Email-only requests are NOT accepted."
    - type: phone
      phone_number: "1-888-678-6880"
      required_fields: [full_name, address]
      notes: "TargetSmart Consumer Privacy phone line."
  difficulty: medium
  estimated_minutes: 10
  processing_days: 30
  legal_max_days: 45
  notes: "Leading provider of voter data and analytics for political campaigns. Claims 171 million cell phone numbers. Discloses data to political organizations, nonprofits, and marketing companies. Email opt-out requests are NOT accepted -- must use webform or phone. Verification required via email confirmation link."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
  state_laws: [california, virginia, colorado, connecticut]

timing:
  typical_removal_days: 30
  relisting_likelihood: high
  recheck_interval_days: 90

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.85
  notes: "Source: California Data Broker Registry, TargetSmart privacy policy, privacy.targetsmart.com, JoinDeleteMe opt-out guide. Registered data broker in California."
