id: aristotle
name: Aristotle
domain: aristotle.com
aliases: [integrity.aristotle.com, voterlistsonline.com]
category: political
data_types:
  - name
  - address
  - phone
  - email
  - dob
  - voter-registration
  - party-affiliation
  - voting-history
  - ethnicity
  - religion
  - health-conditions
  - citizenship-status
  - consumer-interests
  - demographic

scan:
  scannable: false
  reason: "Political data broker. No public consumer search. Sells voter and consumer data to political organizations, candidates, and advertisers."

optout:
  methods:
    - type: web_form
      url: "https://www.aristotle.com/privacy/addendum-for-california-residents/"
      required_fields: [full_name, address]
      template_id: null
      notes: "Online opt-out request form. Opt-out covers all non-publicly available information. Official Voter file data may be exempt. Processing takes up to 45 days."
    - type: phone
      phone_number: "800-296-2747"
      required_fields: [full_name, address]
  difficulty: hard
  estimated_minutes: 15
  processing_days: 45
  legal_max_days: 90
  notes: "Sells personal data to political organizations, candidates, advertisers, and data analytics companies. Collects sensitive data including race, ethnicity, religion, health conditions, and citizenship status. Sources include Secretary of State, Boards of Elections, DMV, public records, social networks, and data compilers. No partial opt-out -- opt-out covers all non-public data. Voter file data may be exempt from opt-out under CCPA political activities exemption."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
  state_laws: [california]

timing:
  typical_removal_days: 45
  relisting_likelihood: high
  recheck_interval_days: 90

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.80
  notes: "Source: Aristotle CCPA FAQs, Aristotle privacy policy, California resident addendum. Collects extensive sensitive categories. Voter file data may be exempt from opt-out."
