id: kochava
name: Kochava
domain: kochava.com
aliases: [media-index.kochava.com]
category: data-aggregator
data_types:
  - location-history
  - device-ids
  - ip-address

scan:
  scannable: false
  reason: "B2B mobile attribution and data platform. No consumer-facing search. Sells geolocation data and mobile advertising IDs."

optout:
  methods:
    - type: web_form
      url: "https://www.kochava.com/opt-out-do-not-sell-request-process/"
      required_fields: [email, device-ids]
    - type: email
      email_to: privacy@kochava.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
    - type: phone
      phone_number: "1-855-862-4282"
      required_fields: [full_name]
  difficulty: medium
  estimated_minutes: 5
  processing_days: 30
  legal_max_days: 45
  notes: "FTC settlement approved Nov 2025 — Kochava must implement consumer opt-out web form, privacy block for sensitive venues (healthcare, schools, jails), obtain proof of consumer consent from data suppliers, and 2-year injunction. Opt-out requests are device-specific — submit each Mobile Advertising ID separately."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
    vermont: false
  state_laws: [california, virginia, colorado, connecticut, texas]

timing:
  typical_removal_days: 30
  relisting_likelihood: medium
  recheck_interval_days: 60

meta:
  added: "2026-02-25"
  last_verified: "2026-02-25"
  verified_by: web_research
  confidence: 0.80
  notes: "Source: FTC enforcement action, Kochava privacy policy. FTC settlement approved Nov 2025 requires privacy block feature for sensitive venues and consumer opt-out mechanism."
