id: cvs-media-exchange
name: CVS Media Exchange
domain: cvs.com
aliases: [cvshealth.com]
category: data-aggregator
data_types:
  - name
  - address
  - phone
  - email
  - purchase-history
  - location-history
  - device-ids

scan:
  scannable: false
  reason: "Retail media platform (CVS Health subsidiary). No consumer-facing data broker search. Uses ExtraCare loyalty and pharmacy shopper data for ad targeting."

optout:
  methods:
    - type: email
      email_to: ConsumerPrivacy@CVSHealth.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
    - type: web_form
      url: "https://www.cvs.com/retail/help/privacy_policy"
      required_fields: []
      steps:
        - action: navigate
          url: "https://www.cvs.com/retail/help/privacy_policy"
          description: "Go to CVS privacy policy page and click 'Do Not Sell or Share My Personal Information' link"
  difficulty: medium
  estimated_minutes: 10
  processing_days: 30
  legal_max_days: 45
  notes: "CVS Media Exchange is CVS Health's retail media network. Uses ExtraCare loyalty card data (74M+ cardholders) and shopper purchase data for ad targeting. May share data with brand partners which constitutes 'sharing' or 'sale' under CCPA. To withdraw from ExtraCare, submit deletion request. Contact: ConsumerPrivacy@CVSHealth.com."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
    vermont: false
  state_laws: [california, virginia, colorado, connecticut, texas]

timing:
  typical_removal_days: 30
  relisting_likelihood: high
  recheck_interval_days: 60

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.75
  notes: "Source: cvs.com/retail/help/privacy_policy, cvs.com/content/california-b2b-privacy-policy. CVS Health's retail media division. ExtraCare has 74M+ cardholders. Contact: ConsumerPrivacy@CVSHealth.com."
