id: lexisnexis
name: LexisNexis
domain: lexisnexis.com
aliases: [risk.lexisnexis.com, accurint.com]
category: data-aggregator
data_types: [name, address, phone, email, dob, relatives, employment, criminal-records, court-records, financial, property-records]

scan:
  scannable: false
  reason: "B2B data aggregator. No public consumer search."

optout:
  methods:
    - type: web_form
      url: "https://optout.lexisnexis.com/"
      required_fields: [full_name, email, address, dob]
      steps:
        - action: navigate
          url: "https://optout.lexisnexis.com/"
        - action: input
          selector: "#firstName"
          value: "{first_name}"
        - action: input
          selector: "#lastName"
          value: "{last_name}"
        - action: input
          selector: "#email"
          value: "{email}"
        - action: input
          selector: "#address"
          value: "{street}"
        - action: input
          selector: "#city"
          value: "{city}"
        - action: select
          selector: "#state"
          value: "{state}"
        - action: input
          selector: "#zip"
          value: "{zip}"
        - action: click
          selector: "#submit"
      template_id: null
    - type: email
      email_to: privacy.information.mgr@lexisnexis.com
      required_fields: [full_name, email, address]
      template_id: ccpa_maximum
    - type: postal
      postal_address: "LexisNexis Consumer Center, P.O. Box 105108, Atlanta, GA 30348-5108"
      required_fields: [full_name, address, dob]
      template_id: ccpa_maximum
  difficulty: hard
  estimated_minutes: 10
  processing_days: 30
  legal_max_days: 45
  notes: "One of the largest data aggregators. May require ID verification. Very slow processing."

legal:
  ccpa: true
  gdpr: true
  registered_broker:
    california: true
    vermont: true
    oregon: true
    texas: true
  state_laws: [california, virginia, colorado, connecticut, texas, oregon, maryland]

timing:
  typical_removal_days: 30
  relisting_likelihood: high
  recheck_interval_days: 90

meta:
  added: "2026-02-25"
  last_verified: "2026-02-25"
  verified_by: manual
  confidence: 0.80
  notes: "Extremely large data holdings. Subsidiaries include Accurint. Slow but generally compliant."
