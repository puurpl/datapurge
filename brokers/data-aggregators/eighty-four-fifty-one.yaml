id: eighty-four-fifty-one
name: 84.51 (Kroger)
domain: 8451.com
aliases: [kroger.com]
category: data-aggregator
data_types:
  - name
  - address
  - phone
  - email
  - purchase-history
  - location-history

scan:
  scannable: false
  reason: "B2B retail data science and media platform (Kroger subsidiary). No consumer-facing search. Uses Kroger loyalty card purchase data for advertising and insights."

optout:
