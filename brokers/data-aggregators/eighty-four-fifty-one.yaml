    - type: email
      email_to: KrogerPrivacyOffice@Kroger.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
    - type: phone
      phone_number: "1-800-576-4377"
      required_fields: [full_name, email]
      notes: "1-800-KROGERS — Kroger Customer Contact Center"
    - type: web_form
      url: "https://www.kroger.com/i/privacy-center"
      required_fields: [full_name, email]
      steps:
        - action: navigate
          url: "https://www.kroger.com/i/privacy-center"
          description: "Go to Kroger Privacy Center to opt out of data sharing"
  difficulty: medium
  estimated_minutes: 10
  processing_days: 30
  legal_max_days: 45
  notes: "84.51 is Kroger's wholly-owned retail data science subsidiary. Uses Kroger loyalty card data (60M+ households) to provide advertising, media, and insights to CPG brands. Opt-out requires Kroger Loyalty ID verification. Contact KrogerPrivacyOffice@Kroger.com or call 1-800-KROGERS (1-800-576-4377)."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
    vermont: false
  state_laws: [california, virginia, colorado, connecticut, texas]

timing:
