id: catalina
name: Catalina Marketing
domain: catalina.com
aliases: [catalinamarketing.com]
category: data-aggregator
data_types:
  - purchase-history
  - device-ids
  - ip-address
  - location-history

scan:
  scannable: false
  reason: "B2B shopper intelligence and targeted media platform. No consumer-facing search. Provides purchase-based audience targeting for CPG brands and retailers."

optout:
  methods:
    - type: web_form
      url: "https://www.catalina.com/legal"
      required_fields: [full_name, email]
      steps:
        - action: navigate
          url: "https://www.catalina.com/legal"
          description: "Go to Catalina Legal page"
        - action: click
          description: "Click 'Privacy Policy' or 'Do Not Sell My Personal Information' link"
        - action: input
          value: "{full_name}"
          description: "Enter your full name"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: submit
          description: "Submit privacy opt-out request"
    - type: email
      email_to: privacy@catalina.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
  difficulty: medium
  estimated_minutes: 10
  processing_days: 30
  legal_max_days: 45
  notes: "Catalina Marketing analyzes purchase data from over 100 million loyalty cardholders to provide targeted digital and in-store media. Processes billions of shopping transactions annually. Also opt out via DAA at www.aboutads.info/choices for digital advertising."

legal:
  ccpa: true
  gdpr: true
  registered_broker:
    california: true
  state_laws: [california, virginia, colorado]

timing:
  typical_removal_days: 30
  relisting_likelihood: medium
  recheck_interval_days: 90

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.75
  notes: "Source: California Data Broker Registry (registration #187555), catalina.com/legal. Shopper intelligence and targeted media company. Tracks purchase behavior via loyalty card programs for 100M+ shoppers. Headquartered in St. Petersburg, FL."
