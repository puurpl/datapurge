id: magnite
name: Magnite
domain: magnite.com
aliases: [rubiconproject.com, spotx.tv, springserve.com]
category: data-aggregator
data_types:
  - device-ids
  - ip-address
  - location-history

scan:
  scannable: false
  reason: "B2B supply-side ad-tech platform (formerly Rubicon Project + SpotX). No consumer-facing search. Collects digital identifiers for programmatic advertising."

optout:
  methods:
    - type: web_form
      url: "https://www.magnite.com/legal/user-choice-portal/"
      required_fields: []
      steps:
        - action: navigate
          url: "https://www.magnite.com/legal/user-choice-portal/"
          description: "Go to Magnite User Choice Portal"
        - action: click
          value: "Opt Out"
          description: "Set opt-out cookie to stop interest-based advertising and sales/sharing of personal information"
    - type: email
      email_to: privacy@magnite.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
  difficulty: medium
  estimated_minutes: 5
  processing_days: 30
  legal_max_days: 45
  notes: "Magnite is the largest independent SSP (formerly Rubicon Project + SpotX merger). Opt-out via User Choice Portal is browser/device specific. For full data deletion, email privacy@magnite.com. Does not process directly identifiable information — collects digital identifiers (cookies, device IDs)."

legal:
  ccpa: true
  gdpr: true
  registered_broker:
    california: true
    vermont: false
  state_laws: [california, virginia, colorado, connecticut, texas, oregon]

timing:
  typical_removal_days: 30
  relisting_likelihood: high
  recheck_interval_days: 30

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.85
  notes: "Source: magnite.com/legal, California Data Broker Registry (reg #568127). Largest independent SSP. Publicly traded (NASDAQ: MGNI). Formed from Rubicon Project + SpotX merger. Contact: privacy@magnite.com."
