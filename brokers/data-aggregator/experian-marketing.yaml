id: experian-marketing
name: Experian Marketing Services
domain: experian.com
aliases: [experianmarketingservices.digital, consumerprivacy.experian.com]
category: data-aggregator
data_types:
  - name
  - address
  - phone
  - email
  - age
  - dob
  - income-estimates
  - purchase-history
  - property-records
  - financial
  - political-affiliation

scan:
  scannable: false
  reason: "B2B data aggregator and marketing platform. Consumer credit reports handled separately via Experian consumer portal."

optout:
  methods:
    - type: email
      email_to: optout@experian.com
      required_fields: [full_name, email, address]
      template_id: ccpa_maximum
    - type: web_form
      url: "https://www.experianmarketingservices.digital/OptOut"
      required_fields: [full_name, address]
    - type: web_form
      url: "https://consumerprivacy.experian.com/ccpa"
      required_fields: [full_name, email, address]
    - type: postal
      postal_address: "Experian, PO Box 703, Allen, TX 75013"
      required_fields: [full_name, address]
      template_id: ccpa_maximum
  difficulty: medium
  estimated_minutes: 10
  processing_days: 14
  legal_max_days: 45
  notes: "Opt-out lasts 5 years, then must re-submit. Separate opt-outs for direct mail, telemarketing, and targeted online advertising. Also use OptOutPrescreen.com for pre-approved credit offers."

legal:
  ccpa: true
  gdpr: true
  registered_broker:
    california: true
    vermont: true
  state_laws: [california, virginia, colorado, connecticut, texas, oregon]

timing:
  typical_removal_days: 14
  relisting_likelihood: high
  recheck_interval_days: 60

meta:
  added: "2026-02-25"
  last_verified: "2026-02-25"
  verified_by: web_research
  confidence: 0.90
  notes: "Source: California Data Broker Registry, Experian privacy portal. Experian Marketing Solutions LLC is a registered data broker under Texas law. Opt-out only lasts 5 years."
