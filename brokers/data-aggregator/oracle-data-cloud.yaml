  reason: "DEFUNCT — Oracle decommissioned the entire Oracle Advertising division (BlueKai, Datalogix, Moat, Grapeshot) in Sept 2024. The opt-out portal now redirects to a contracts page with only an 'Oracle Advertising End-of-Life FAQs' PDF."

optout:
