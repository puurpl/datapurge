id: throtle
name: Throtle
domain: throtle.io
aliases: []
category: data-aggregator
data_types:
  - name
  - address
  - phone
  - email
  - device-ids
  - ip-address

scan:
  scannable: false
  reason: "B2B identity resolution and data onboarding platform. No consumer-facing search. Provides deterministic identity graphs linking offline PII to digital identifiers."

optout:
  methods:
    - type: web_form
      url: "https://www.throtle.io/data-privacy-manager/do-not-sell-request"
      required_fields: [full_name, email, address]
      steps:
        - action: navigate
          url: "https://www.throtle.io/data-privacy-manager/do-not-sell-request"
          description: "Go to Throtle 'Do Not Sell' request form"
        - action: input
          value: "{full_name}"
          description: "Enter your full name"
        - action: input
          value: "{email}"
          description: "Enter your email address"
        - action: input
          value: "{address}"
          description: "Enter your mailing address"
        - action: submit
          description: "Submit do-not-sell request"
    - type: email
      email_to: privacy@throtle.io
      required_fields: [full_name, email, address]
      template_id: ccpa_maximum
  difficulty: medium
  estimated_minutes: 10
  processing_days: 30
  legal_max_days: 45
  notes: "Throtle provides deterministic identity resolution and data onboarding. Builds identity graphs connecting offline PII to digital identifiers using anonymous tokens. Verification requires name/address, email, or MAID (Mobile Advertising ID). Also serves healthcare marketing (HIPAA-aware)."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
  state_laws: [california, virginia, colorado, texas]

timing:
  typical_removal_days: 30
  relisting_likelihood: medium
  recheck_interval_days: 90

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.80
  notes: "Source: California Data Broker Registry (registration #185964), throtle.io/privacy, JoinDeleteMe opt-out guide. Identity resolution company that builds deterministic identity graphs. Also serves healthcare sector. NAI member."
