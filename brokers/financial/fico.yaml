id: fico
name: FICO (Fair Isaac Corporation)
domain: fico.com
aliases: [myfico.com]
category: financial
data_types:
  - name
  - address
  - email
  - phone
  - financial

scan:
  scannable: false
  reason: "Credit scoring and analytics company. No public consumer search. Consumers can access scores via myFICO."

optout:
  methods:
    - type: email
      email_to: privacy@fico.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
    - type: web_form
      url: "https://www.fico.com/en/trust-center/data-privacy"
      required_fields: [full_name, email]
      steps:
        - action: navigate
          url: "https://www.fico.com/en/trust-center/data-privacy"
          description: "Go to FICO Trust Center data privacy page"
        - action: click
          value: "Submit a Privacy Request"
          description: "Click to submit a privacy request"
        - action: input
          value: "{full_name}"
          description: "Enter full name"
        - action: input
          value: "{email}"
          description: "Enter email address"
        - action: submit
          description: "Submit data deletion request"
      template_id: null
    - type: phone
      phone_number: "888-342-6336"
      required_fields: [full_name, email]
      notes: "Call 1-888-FICO-EDM Monday-Friday to opt out of marketing solicitations"
  difficulty: medium
  estimated_minutes: 15
  processing_days: 30
  legal_max_days: 45
  notes: "FICO develops credit scoring models used by 90% of top US lenders. myFICO.com is their consumer-facing product. For data deletion, use the FICO Trust Center. Identity verification required for account holders. Marketing opt-out available via phone. Privacy policy last updated September 2025."

legal:
  ccpa: true
  gdpr: true
  registered_broker:
    california: true
  state_laws: [california, virginia, colorado, connecticut, texas, oregon]

timing:
  typical_removal_days: 30
  relisting_likelihood: low
  recheck_interval_days: 180

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.85
  notes: "Major credit scoring company. Source: fico.com/en/privacy-policy, fico.com/en/trust-center/data-privacy, PrivacyHawk opt-out guide."
