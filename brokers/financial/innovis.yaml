id: innovis
name: Innovis
domain: innovis.com
aliases: []
category: financial
data_types:
  - name
  - address
  - phone
  - dob
  - financial

scan:
  scannable: false
  reason: "Consumer reporting agency. No public search. Consumers can request their own credit report."

optout:
  methods:
    - type: web_form
      url: "https://www.innovis.com/personal/optOutOptIn"
      required_fields: [full_name, dob, address]
      steps:
        - action: navigate
          url: "https://www.optoutprescreen.com"
          description: "Go to OptOutPrescreen.com (joint initiative with all 4 major CRAs)"
        - action: input
          value: "{full_name}"
          description: "Enter full name"
        - action: input
          value: "{dob}"
          description: "Enter date of birth"
        - action: input
          value: "{ssn}"
          description: "Enter Social Security number"
        - action: input
          value: "{address}"
          description: "Enter current address"
        - action: submit
          description: "Submit opt-out request to all four bureaus"
      template_id: null
    - type: email
      email_to: privacy@innovis.com
      required_fields: [full_name, email, dob]
      template_id: ccpa_maximum
    - type: phone
      phone_number: "888-567-8688"
      required_fields: [full_name, dob]
      notes: "Call to opt out of marketing lists"
  difficulty: medium
  estimated_minutes: 10
  processing_days: 5
  legal_max_days: 30
  notes: "FCRA-regulated consumer reporting agency (the 4th major credit bureau). Opt-out via OptOutPrescreen.com covers all 4 bureaus. Security freeze available with 10-digit PIN. Privacy Officer reachable at privacy@innovis.com or 1-855-871-3076. EU/UK/Swiss and some US state residents can request data erasure."

legal:
  ccpa: false
  gdpr: true
  registered_broker:
    california: false
  state_laws:
    - california
    - virginia
    - colorado

timing:
  typical_removal_days: 5
  relisting_likelihood: low
  recheck_interval_days: 365

meta:
  added: "2026-02-25"
  last_verified: "2026-02-25"
  verified_by: web_research
  confidence: 0.90
  notes: "4th major US credit bureau. FCRA-regulated CRA. FCRA obligations apply. Source: innovis.com, OptOutPrescreen.com."
