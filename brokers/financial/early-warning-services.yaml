id: early-warning-services
name: Early Warning Services (Zelle)
domain: earlywarning.com
aliases: [zelle.com, zellepay.com]
category: financial
data_types:
  - name
  - address
  - phone
  - dob
  - financial

scan:
  scannable: false
  reason: "Consumer reporting agency for deposit account and payment fraud data. No public search. Consumers can request a free file disclosure."

optout:
  methods:
    - type: email
      email_to: zelleprivacy@earlywarning.com
      required_fields: [full_name, email, address]
      template_id: ccpa_maximum
    - type: web_form
      url: "https://www.earlywarning.com/consumer-information"
      required_fields: [full_name, dob, address]
      steps:
        - action: navigate
          url: "https://www.earlywarning.com/consumer-information"
          description: "Go to Early Warning consumer information page"
        - action: click
          value: "Request a File Disclosure"
          description: "Request your file disclosure or submit a privacy request"
        - action: input
          value: "{full_name}"
          description: "Enter full name"
        - action: input
          value: "{dob}"
          description: "Enter date of birth"
        - action: input
          value: "{address}"
          description: "Enter current address"
        - action: submit
          description: "Submit request"
      template_id: null
  difficulty: hard
  estimated_minutes: 20
  processing_days: 30
  legal_max_days: 45
  notes: "FCRA-regulated specialty CRA. Co-owned by seven major US banks (Bank of America, JPMorgan Chase, Wells Fargo, Capital One, PNC, Truist, US Bank). Operates Zelle payment network. May retain data due to legal obligations. Privacy Office: Early Warning Services, LLC, Attn: Privacy Office, 5801 N Pima Rd, Scottsdale, AZ 85250. Marketing opt-out: marketing@earlywarning.com."

legal:
  ccpa: false
  gdpr: false
  registered_broker:
    california: false
  state_laws: []

timing:
  typical_removal_days: 30
  relisting_likelihood: low
  recheck_interval_days: 365

meta:
  added: "2026-02-26"
  last_verified: "2026-02-26"
  verified_by: web_research
  confidence: 0.85
  notes: "FCRA-regulated specialty CRA for deposit account fraud and payment data. Parent company of Zelle. Source: earlywarning.com/consumer-information, zelle.com privacy notices, CFPB consumer reporting companies list."
