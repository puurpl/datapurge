id: chexsystems
name: ChexSystems
domain: chexsystems.com
aliases: []
category: financial
data_types:
  - name
  - address
  - phone
  - dob
  - financial

scan:
  scannable: false
  reason: "Consumer reporting agency. No public search. Consumers can request their own disclosure report."

optout:
  methods:
    - type: web_form
      url: "https://www.chexsystems.com/optout"
      required_fields: [full_name, dob, address]
      steps:
        - action: navigate
          url: "https://www.chexsystems.com/optout"
          description: "Go to ChexSystems opt-out page"
        - action: input
          value: "{full_name}"
          description: "Enter full name"
        - action: input
          value: "{dob}"
          description: "Enter date of birth"
        - action: input
          value: "{ssn}"
          description: "Enter Social Security number"
        - action: input
          value: "{address}"
          description: "Enter current address"
        - action: submit
          description: "Submit opt-out request"
      template_id: null
    - type: email
      email_to: chexsystems.cr@fisglobal.com
      required_fields: [full_name, dob, address]
      template_id: ccpa_maximum
    - type: phone
      phone_number: "877-678-6885"
      required_fields: [full_name, dob]
      notes: "Call 877-OPTOUT5 to opt out of prescreen lists for 5 years"
  difficulty: medium
  estimated_minutes: 15
  processing_days: 5
  legal_max_days: 30
  notes: "FCRA-regulated specialty consumer reporting agency. Opt-out removes name from prescreen lists for firm offers of credit/insurance for 5 years (consumers 21+). Security freeze available to block release of consumer file without authorization. Disputes of inaccurate information are a separate process. Use caution when emailing sensitive information to chexsystems.cr@fisglobal.com."

legal:
  ccpa: false
  gdpr: false
  registered_broker:
    california: false
  state_laws:
    - california

timing:
  typical_removal_days: 5
  relisting_likelihood: low
  recheck_interval_days: 365

meta:
  added: "2026-02-25"
  last_verified: "2026-02-25"
  verified_by: web_research
  confidence: 0.90
  notes: "FCRA-regulated specialty CRA for banking/checking account history. Subsidiary of FIS. FCRA obligations apply. Source: chexsystems.com privacy policy, CFPB consumer reporting companies list."
