      url: "https://www.askcertegy.com/ask_certegy.jsp"
      required_fields: [full_name, dob, address]
      steps:
        - action: navigate
          url: "https://www.askcertegy.com/ask_certegy.jsp"
          description: "Go to Certegy consumer assistance portal"
        - action: input
          value: "{full_name}"
          description: "Enter full name"
        - action: input
          value: "{dob}"
          description: "Enter date of birth"
        - action: input
          value: "{address}"
          description: "Enter current address"
        - action: submit
          description: "Submit consumer assistance request"
      template_id: null
