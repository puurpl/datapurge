  notes: "FCRA-regulated specialty CRA for check writing history, returned checks, and account closures. Subsidiary of Fidelity National Information Services (FIS). Free report available every 12 months or within 60 days of a check decline. CCPA rights may not apply to credit reporting information under FCRA exemption. Mail: Certegy Payment Solutions, LLC, Attn: CFDR Request, PO Box 30046, Tampa, FL 33630-3046. Identity theft reports: PO Box 908, Grand Junction, CO 81502."

