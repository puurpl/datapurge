id: advanced-background-checks
name: Advanced Background Checks
domain: advancedbackgroundchecks.com
aliases: []
category: background-check
data_types:
  - name
  - address
  - phone
  - email
  - age
  - dob
  - relatives
  - associates
  - criminal-records
  - court-records
  - property-records

scan:
  scannable: true
  method: web_search
  search_url: "https://www.advancedbackgroundchecks.com/names/{first_name}-{last_name}/{state}"
  detection:
    - method: selector_present
      value: ".result-card"
      means: listed
    - method: text_match
      value: "No results found"
      means: not_listed
  anti_bot:
    captcha: false
    cloudflare: true
    rate_limit_per_minute: 2

optout:
  methods:
    - type: web_form
      url: "https://www.advancedbackgroundchecks.com/removal"
      required_fields: [full_name, email]
      steps:
        - action: navigate
          url: "https://www.advancedbackgroundchecks.com/removal"
          description: "Go to the opt-out removal page"
        - action: input
          value: "{first_name}"
          description: "Enter first name"
        - action: input
          value: "{last_name}"
          description: "Enter last name"
        - action: click
          description: "Search for your record and click Remove"
        - action: verify_email
          description: "Check email for confirmation link and click it"
      template_id: null
    - type: email
      email_to: support@advancebackgroundchecks.zendesk.com
      required_fields: [full_name, email]
      template_id: ccpa_maximum
  difficulty: easy
  estimated_minutes: 5
  processing_days: 2
  legal_max_days: 45
  notes: "Uses publicly available information from public records. Opt-out processed within 24-48 hours after email verification. Records may reappear and require repeated opt-out. CCPA opt-out via 'Do Not Sell My Personal Information' link on site."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
  state_laws:
    - california
    - virginia
    - colorado

timing:
  typical_removal_days: 2
  relisting_likelihood: high
  recheck_interval_days: 30

meta:
  added: "2026-02-25"
  last_verified: "2026-02-25"
  verified_by: web_research
  confidence: 0.85
  notes: "Public records aggregator categorized as identity verification service. Sacramento, CA based. Source: Privacy Rights Clearinghouse, California Data Broker Registry."
