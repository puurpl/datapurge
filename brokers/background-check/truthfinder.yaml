id: truthfinder
name: TruthFinder
domain: truthfinder.com
aliases: []
category: background-check
data_types:
  - name
  - address
  - phone
  - email
  - age
  - dob
  - relatives
  - associates
  - employment
  - criminal-records
  - court-records
  - property-records
  - social-media
  - photos

scan:
  scannable: true
  method: web_search
  search_url: "https://www.truthfinder.com/results/?firstName={first_name}&lastName={last_name}&state={state}"
  detection:
    - method: text_match
      value: "results found"
      means: listed
    - method: text_match
      value: "No results"
      means: not_listed
  anti_bot:
    captcha: true
    cloudflare: true
    rate_limit_per_minute: 1

optout:
  methods:
    - type: web_form
      url: "https://www.truthfinder.com/opt-out/v2/"
      required_fields: [full_name, email, dob, state]
      steps:
        - action: navigate
          url: "https://www.truthfinder.com/opt-out/v2/"
          description: "Go to TruthFinder opt-out page"
        - action: input
          selector: "input[name='firstName']"
          value: "{first_name}"
          description: "Enter first name"
        - action: input
          selector: "input[name='lastName']"
          value: "{last_name}"
          description: "Enter last name"
        - action: click
          selector: "button[type='submit']"
          description: "Search for your record"
        - action: verify_email
          description: "Verify your email via PeopleConnect to complete opt-out"
      template_id: null
    - type: email
      email_to: help@truthfinder.com
      required_fields: [full_name, email, dob, address]
      template_id: ccpa_maximum
  difficulty: medium
  estimated_minutes: 10
  processing_days: 2
  legal_max_days: 45
  notes: "Part of PeopleConnect network. Opt-out processed within 48 hours. Requires email verification via PeopleConnect. Can also exercise CCPA rights by emailing help@truthfinder.com with applicable law, screenshot of record, full name, DOB, city/state, phone, and email."

legal:
  ccpa: true
  gdpr: false
  registered_broker:
    california: true
  state_laws:
    - california
    - virginia
    - colorado
    - connecticut
    - utah

timing:
  typical_removal_days: 2
  relisting_likelihood: high
  recheck_interval_days: 30

meta:
  added: "2026-02-25"
  last_verified: "2026-02-25"
  verified_by: web_research
  confidence: 0.90
  notes: "People-search/background check hybrid. Part of PeopleConnect. Registered California data broker. High relisting rate. Source: California Data Broker Registry, TruthFinder privacy policy."
