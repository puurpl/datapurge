id: checkr
name: Checkr
domain: checkr.com
aliases: []
category: background-check
data_types:
  - name
  - address
  - phone
  - email
  - dob
  - employment
  - education
  - criminal-records
  - court-records

scan:
  scannable: false
  reason: "Employment background check service, no public consumer search."

optout:
  methods:
    - type: email
      email_to: hello@checkr.com
      required_fields: [full_name, email, dob]
      template_id: ccpa_maximum
    - type: email
      email_to: dpo@checkr.com
      required_fields: [full_name, email, dob]
      template_id: ccpa_maximum
  difficulty: hard
  estimated_minutes: 15
  processing_days: 30
  legal_max_days: 45
  notes: "FCRA-regulated CRA. Background screening data is exempt from CCPA under FCRA. GDPR requests go to dpo@checkr.com. General privacy requests go to hello@checkr.com. Deletion of background check data (criminal history, MVR) is generally not required under CCPA due to FCRA exemption."

legal:
  ccpa: false
  gdpr: true
  registered_broker:
    california: false
  state_laws:
    - california
    - virginia
    - colorado
    - connecticut

timing:
  typical_removal_days: 30
  relisting_likelihood: low
  recheck_interval_days: 180

