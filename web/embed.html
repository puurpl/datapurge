<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataPurge — Data Broker Opt-Out</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Embed overrides — compact, no chrome */
        body {
            min-height: auto;
            overflow-x: hidden;
        }
        .embed-root {
            max-width: 720px;
            margin: 0 auto;
            padding: 0.75rem 1rem;
        }
        .embed-root .view { padding: 0.5rem 0; }
        .embed-root .setup-page { padding: 1rem 0; }
        .embed-root .setup-header { margin-bottom: 1.5rem; }
        .embed-root .container-narrow { padding: 0; }
        .embed-root .progress-header {
            grid-template-columns: repeat(2, 1fr);
        }

        /* Embed nav — minimal tabs only */
        .embed-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--color-border);
            padding-bottom: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .embed-nav-tabs {
            display: flex;
            gap: 0.25rem;
        }
        .embed-nav-tabs a {
            padding: 0.375rem 0.75rem;
            border-radius: var(--radius);
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--color-text-secondary);
            text-decoration: none;
            transition: all var(--transition);
        }
        .embed-nav-tabs a:hover {
            color: var(--color-text);
            background: var(--color-surface);
        }
        .embed-nav-tabs a.active {
            color: var(--color-primary);
            background: var(--color-primary-light);
        }

        /* Attribution footer */
        .embed-footer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 0.75rem 0;
            margin-top: 1rem;
            border-top: 1px solid var(--color-border);
            font-size: 0.6875rem;
            color: var(--color-text-muted);
        }
        .embed-footer a {
            color: var(--color-text-secondary);
            text-decoration: none;
        }
        .embed-footer a:hover {
            color: var(--color-primary);
        }
        .embed-footer-sep {
            color: var(--color-border);
        }
    </style>
</head>
<body>

    <div class="embed-root">
        <!-- Minimal nav -->
        <nav class="embed-nav" aria-label="App navigation">
            <div class="embed-nav-tabs" role="tablist">
                <a href="#queue" class="nav-tab" role="tab">Queue</a>
                <a href="#brokers" class="nav-tab" role="tab">Brokers</a>
                <a href="#progress" class="nav-tab" role="tab">Progress</a>
            </div>
            <div id="profile-switcher"></div>
        </nav>

        <!-- Views -->
        <div class="view" id="view-setup" role="tabpanel"></div>
        <div class="view" id="view-queue" hidden role="tabpanel"></div>
        <div class="view" id="view-brokers" hidden role="tabpanel"></div>
        <div class="view" id="view-progress" hidden role="tabpanel"></div>

        <!-- Attribution -->
        <footer class="embed-footer">
            <a href="https://datapurge.iamnottheproduct.com" target="_blank" rel="noopener">
                Powered by <strong>DataPurge</strong>
            </a>
            <span class="embed-footer-sep">|</span>
            <a href="https://github.com/puurpl/opt-out" target="_blank" rel="noopener">Open Source</a>
            <span class="embed-footer-sep">|</span>
            <a href="https://buymeacoffee.com/puurpl" target="_blank" rel="noopener">Support this project</a>
        </footer>
    </div>

    <!-- Toast container -->
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
