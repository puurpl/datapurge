name = "datapurge-drip"
main = "src/index.js"
compatibility_date = "2024-12-01"

[triggers]
crons = ["0 8 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "datapurge-drip"
database_id = "" # Set after `wrangler d1 create datapurge-drip`

[vars]
FROM_EMAIL = "DataPurge <noreply@datapurge.iamnottheproduct.com>"
RESEND_DOMAIN = "datapurge.iamnottheproduct.com"

# Secrets (set via `wrangler secret put`):
# RESEND_API_KEY
