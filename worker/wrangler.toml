name = "datapurge-drip"
main = "src/index.js"
compatibility_date = "2024-12-01"

routes = [
    { pattern = "drip.datapurge.iamnottheproduct.com", custom_domain = true }
]

[triggers]
crons = ["0 8 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "datapurge-drip"
database_id = "83d3cd04-6d98-40dd-a85c-8bf0a1fbc2ec"

[vars]
FROM_EMAIL = "DataPurge <noreply@datapurge.iamnottheproduct.com>"
RESEND_DOMAIN = "datapurge.iamnottheproduct.com"

# Secrets (set via `wrangler secret put`):
# RESEND_API_KEY
